<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA | Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        
        .background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .background { 
            width: 100%; height: 100%; 
            background-image: url('babba.jpg'); 
            background-size: cover; 
            background-position: center; 
            filter: brightness(0.6); 
        }

        .overlay { 
            height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; text-align: center; 
        }

        h1 { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); 
            color: #ff0000; 
            text-shadow: 0 0 15px #000; 
            letter-spacing: 10px; 
            margin-bottom: 25px; 
            text-transform: uppercase;
        }

        input { 
            padding: 15px; border: 2px solid #ff0000; 
            background: rgba(0, 0, 0, 0.7); 
            color: white; outline: none; width: 300px; 
            font-size: 1.1rem; text-align: center; 
        }

        .btn { 
            padding: 15px 35px; background: #ff0000; 
            color: white; border: none; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; margin-top: 10px;
        }

        .main-btn { 
            padding: 18px 45px; font-size: 1.2rem; font-weight: bold; 
            border: 3px solid #ff0000; background: none; color: #ff0000; 
            cursor: pointer; margin: 10px; transition: 0.3s; 
            text-transform: uppercase;
        }

        .main-btn:hover { background: #ff0000; color: white; box-shadow: 0 0 15px #ff0000; }

        #joinPanel { 
            display: none; flex-direction: column; 
            gap: 12px; align-items: center; margin-top: 15px; 
        }

        #welcomeText { color: #4ade80; font-size: 1.4rem; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="background"></div>
    </div>

    <div class="overlay">
        <h1>TDV-MAFIA</h1>
        
        <div id="loginArea">
            <input type="text" id="nameInput" placeholder="AGENT ADI...">
            <br>
            <button class="btn" onclick="handleLogin()">GİRİŞ</button>
        </div>

        <div id="menuArea" style="display:none;">
            <p id="welcomeText"></p>
            <div id="btnGroup">
                <button class="main-btn" onclick="location.href='yarat.html'">YARAT</button>
                <button class="main-btn" onclick="openJoin()">QOŞUL</button>
            </div>
            
            <div id="joinPanel">
                <input type="text" id="codeInput" placeholder="OTAQ KODU (U123456)">
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="handleJoin()">QOŞUL</button>
                    <button class="btn" style="background: #444;" onclick="closeJoin()">GERİ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Konfiqurasiyası
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function handleLogin() {
            const name = document.getElementById("nameInput").value.trim();
            if (!name) return;
            localStorage.setItem("mafia_nickname", name);
            checkUser();
        }

        function checkUser() {
            const saved = localStorage.getItem("mafia_nickname");
            if (saved) {
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("menuArea").style.display = "block";
                document.getElementById("welcomeText").innerText = "AGENT: " + saved;
            }
        }

        function openJoin() {
            document.getElementById("btnGroup").style.display = "none";
            document.getElementById("joinPanel").style.display = "flex";
        }

        function closeJoin() {
            document.getElementById("btnGroup").style.display = "flex";
            document.getElementById("joinPanel").style.display = "none";
        }

        function handleJoin() {
            const code = document.getElementById("codeInput").value.trim().toUpperCase();
            if (!code) return;

            // Firebase-də otağı axtarırıq
            database.ref('rooms/' + code).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    location.href = "yarat.html?join=" + code;
                } else {
                    alert("DİQQƏT: Belə bir otaq tapılmadı! Kodu düz yazdığınızdan əmin olun.");
                }
            }).catch((error) => {
                alert("Bağlantı xətası!");
                console.error(error);
            });
        }

        window.onload = checkUser;
    </script>

</body>
</html>
