<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA | Giriş</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('babba.jpg') center/cover; filter: brightness(0.6); }
        .overlay { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        h1 { font-size: 4rem; color: red; text-shadow: 0 0 20px #000; letter-spacing: 10px; margin-bottom: 20px; }
        input { padding: 15px; border: 2px solid red; background: rgba(0,0,0,0.7); color: white; width: 300px; text-align: center; font-size: 1.2rem; outline: none; }
        .btn { padding: 15px 30px; background: red; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .main-btn { padding: 20px 50px; font-size: 1.3rem; font-weight: bold; border: 3px solid red; background: none; color: red; cursor: pointer; margin: 10px; transition: 0.3s; }
        .main-btn:hover { background: red; color: white; }
        #joinPanel { display: none; flex-direction: column; gap: 10px; align-items: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay">
        <h1>TDV-MAFIA</h1>
        <div id="authArea">
            <input type="text" id="nameInp" placeholder="ADINIZI YAZIN...">
            <button class="btn" onclick="login()">GİRİŞ</button>
        </div>
        <div id="menuArea" style="display:none;">
            <p id="uName" style="color:#4ade80; font-size:1.5rem; margin-bottom:20px;"></p>
            <div id="btns">
                <button class="main-btn" onclick="location.href='yarat.html'">YARAT</button>
                <button class="main-btn" onclick="showJ()">KODLA QOŞUL</button>
            </div>
            <div id="joinPanel">
                <input type="text" id="cInp" placeholder="OTAQ KODU">
                <div style="display:flex; gap:10px;">
                    <button class="btn" onclick="join()">DAXİL OL</button>
                    <button class="btn" style="background:#444;" onclick="hideJ()">GERİ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const n = document.getElementById("nameInp").value.trim();
            if(!n) return;
            localStorage.setItem("mafia_nickname", n);
            check();
        }

        function check() {
            const user = localStorage.getItem("mafia_nickname");
            if(user) {
                document.getElementById("authArea").style.display = "none";
                document.getElementById("menuArea").style.display = "block";
                document.getElementById("uName").innerText = "AGENT: " + user;
            }
        }

        function showJ() { document.getElementById("btns").style.display="none"; document.getElementById("joinPanel").style.display="flex"; }
        function hideJ() { document.getElementById("btns").style.display="flex"; document.getElementById("joinPanel").style.display="none"; }

        function join() {
            const code = document.getElementById("cInp").value.trim().toUpperCase();
            db.ref('rooms/' + code).once('value', (snap) => {
                if(snap.exists()) {
                    location.href = "yarat.html?join=" + code;
                } else {
                    alert("OTAQ TAPILMADI!");
                }
            });
        }
        window.onload = check;
    </script>
</body>
</html>
