<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body, html { 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background {
            /* İstədiyin 150% ölçü bura tətbiq olundu */
            width: 150%; 
            height: 150%;
            /* Şəklin adını GitHub-da necə qoymusansa ora yaz (məs: babba.jpg) */
            background-image: url('babba.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            flex-shrink: 0;
        }

        .overlay {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        h1 { 
            font-size: 4.5rem; 
            margin-bottom: 20px; 
            color: #ff0000; 
            text-shadow: 0 0 20px black, 0 0 10px red;
            letter-spacing: 10px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 35px;
            border: 3px solid #ff0000;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        #userDisplay { 
            margin-bottom: 20px; 
            color: #4ade80; 
            font-weight: bold; 
            font-size: 1.4rem; 
            text-transform: uppercase;
        }

        input { 
            padding: 15px; 
            border: 1px solid #ff0000; 
            background: #000; 
            color: white; 
            outline: none; 
            width: 250px; 
            font-size: 1.1rem;
            text-align: center;
        }

        .ok-btn {
            padding: 15px 30px;
            background-color: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
            transition: 0.3s;
        }

        .ok-btn:hover { background-color: #b30000; transform: scale(1.05); }

        .action-buttons { display: flex; gap: 30px; }

        .main-btn {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ff0000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .main-btn:hover { 
            background: #ff0000; 
            box-shadow: 0 0 20px #ff0000;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="background"></div>
    </div>

    <div class="overlay" id="mainContent">
        <h1>TDV-MAFIA</h1>

        <div class="login-box">
            <div id="userDisplay"></div>
            <div id="inputBox">
                <input type="text" id="nameInp" placeholder="LƏQƏBİNİ YAZ...">
                <button class="ok-btn" onclick="savePlayer()">OK</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="main-btn" onclick="openYarat()">YARAT</button>
            <button class="main-btn">KODLA QOŞUL</button>
        </div>
    </div>

    <script>
        // Səhifə yüklənəndə yaddaşda ad varmı?
        window.onload = function() {
            const saved = localStorage.getItem("mafia_nickname");
            if(saved) {
                showUser(saved);
            }
        }

        function savePlayer() {
            let val = document.getElementById("nameInp").value.trim();
            if(val === "") return;
            
            // Adın sonuna 2 random rəqəm əlavə edirik (Təkrarlanmasın deyə)
            let finalName = val + Math.floor(10 + Math.random() * 89);
            localStorage.setItem("mafia_nickname", finalName);
            showUser(finalName);
        }

        function showUser(name) {
            document.getElementById("userDisplay").innerText = "AGENT: " + name;
            document.getElementById("inputBox").style.display = "none";
        }

        function openYarat() {
            document.getElementById("mainContent").innerHTML = `
                <h1 style="font-size:3rem;">OTAQ AYARLARI</h1>
                <div class="login-box">
                    <p style="color:white; margin-bottom:20px;">Yeni mafia sessiyası başladılır...</p>
                    <button class="ok-btn" onclick="location.reload()">GERİ QAYIT</button>
                </div>
            `;
        }
    </script>
</body>
</html>
