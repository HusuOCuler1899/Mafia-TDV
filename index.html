<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA | Ana Səhifə</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover; filter: brightness(0.6); }
        .overlay { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        h1 { font-size: 4rem; color: #ff0000; text-shadow: 0 0 15px #000; letter-spacing: 10px; margin-bottom: 25px; }
        input { padding: 15px; border: 2px solid #ff0000; background: rgba(0,0,0,0.7); color: white; width: 300px; text-align: center; font-size: 1.1rem; outline: none; }
        .btn { padding: 15px 35px; background: #ff0000; color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .main-btn { padding: 18px 45px; font-size: 1.2rem; font-weight: bold; border: 3px solid #ff0000; background: none; color: #ff0000; cursor: pointer; margin: 10px; text-transform: uppercase; transition: 0.3s; }
        .main-btn:hover { background: #ff0000; color: white; }
        #joinPanel { display: none; flex-direction: column; gap: 10px; align-items: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg"></div></div>
    <div class="overlay">
        <h1>TDV-MAFIA</h1>
        <div id="loginArea">
            <input type="text" id="nameInp" placeholder="ADINIZI YAZIN...">
            <br>
            <button type="button" class="btn" id="loginBtn">GİRİŞ</button>
        </div>
        <div id="menuArea" style="display:none;">
            <p id="welcomeMsg" style="color:#4ade80; font-size:1.5rem; margin-bottom:20px; font-weight:bold;"></p>
            <div id="btnGroup">
                <button type="button" class="main-btn" id="createBtn">YARAT</button>
                <button type="button" class="main-btn" id="openJoinBtn">QOŞUL</button>
            </div>
            <div id="joinPanel">
                <input type="text" id="codeInp" placeholder="OTAQ KODUNU YAZIN">
                <div style="display:flex; gap:10px;">
                    <button type="button" class="btn" id="submitJoinBtn">DAXİL OL</button>
                    <button type="button" class="btn" style="background:#444;" id="closeJoinBtn">GERİ</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function checkAuth() {
            const user = localStorage.getItem("mafia_nickname");
            if(user) {
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("menuArea").style.display = "block";
                document.getElementById("welcomeMsg").innerText = "AGENT: " + user;
            }
        }
        document.getElementById("loginBtn").addEventListener("click", function() {
            const n = document.getElementById("nameInp").value.trim();
            if(!n) return;
            localStorage.setItem("mafia_nickname", n);
            checkAuth();
        });
        document.getElementById("createBtn").addEventListener("click", function() { window.location.href = 'yarat.html'; });
        document.getElementById("openJoinBtn").addEventListener("click", function() {
            document.getElementById("btnGroup").style.display = "none";
            document.getElementById("joinPanel").style.display = "flex";
        });
        document.getElementById("closeJoinBtn").addEventListener("click", function() {
            document.getElementById("btnGroup").style.display = "flex";
            document.getElementById("joinPanel").style.display = "none";
        });
        document.getElementById("submitJoinBtn").addEventListener("click", function() {
            const c = document.getElementById("codeInp").value.trim().toUpperCase();
            if(!c) return;
            db.ref('rooms/' + c).once('value').then(function(s) {
                if(s.exists()) { window.location.href = "yarat.html?join=" + c; }
                else { alert("OTAQ TAPILMADI!"); }
            });
        });
        window.onload = checkAuth;
    </script>
</body>
</html>
