<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .background {
            width: 100%; height: 100%;
            background-image: url('babba.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.7);
        }

        .overlay {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            color: #ff0000;
            text-shadow: 0 0 20px #000;
            letter-spacing: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .auth-box, .menu-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        input {
            padding: 15px;
            border: 2px solid #ff0000;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
            width: 300px;
            font-size: 1.2rem;
            text-align: center;
        }

        .ok-btn {
            padding: 15px 40px;
            background-color: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .ok-btn:hover { background-color: #b30000; }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .main-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #ff0000;
            background: none;
            color: #ff0000;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .main-btn:hover {
            background: #ff0000;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        #joinPanel {
            display: none;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 20px;
        }

        #userDisplay {
            color: #4ade80;
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="background"></div>
    </div>

    <div class="overlay">
        <h1>TDV-MAFIA</h1>
        
        <div id="authSection" class="auth-box">
            <input type="text" id="nameInp" placeholder="AGENT ADI...">
            <button class="ok-btn" onclick="login()">TƏSDİQLƏ</button>
        </div>

        <div id="menuSection" class="menu-box" style="display: none;">
            <div id="userDisplay"></div>
            
            <div id="mainBtns" class="action-buttons">
                <button class="main-btn" onclick="location.href='yarat.html'">YARAT</button>
                <button class="main-btn" onclick="showJoin()">QOŞUL</button>
            </div>
            
            <div id="joinPanel">
                <input type="text" id="roomCodeInp" placeholder="OTAQ KODU">
                <div class="action-buttons">
                    <button class="ok-btn" onclick="joinRoom()">DAXİL OL</button>
                    <button class="ok-btn" style="background-color: #555;" onclick="hideJoin()">GERİ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Giriş funksiyası
        function login() {
            const name = document.getElementById("nameInp").value.trim();
            if(!name) {
                alert("Zəhmət olmasa ad yazın!");
                return;
            }
            localStorage.setItem("mafia_nickname", name);
            checkAuth();
        }

        // Yoxlama funksiyası
        function checkAuth() {
            const savedName = localStorage.getItem("mafia_nickname");
            if(savedName) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("menuSection").style.display = "block";
                document.getElementById("userDisplay").innerText = "AGENT: " + savedName;
            }
        }

        // Panelləri göstərib gizlətmək
        function showJoin() {
            document.getElementById("mainBtns").style.display = "none";
            document.getElementById("joinPanel").style.display = "flex";
        }

        function hideJoin() {
            document.getElementById("mainBtns").style.display = "flex";
            document.getElementById("joinPanel").style.display = "none";
        }

        // Otağa qoşulma funksiyası
        function joinRoom() {
            const code = document.getElementById("roomCodeInp").value.trim().toUpperCase();
            if(!code) return;

            const roomData = localStorage.getItem("room_" + code);
            
            if(!roomData) {
                alert("XƏTA: Belə bir otaq tapılmadı! (Kodu yoxlayın)");
                return;
            }

            const room = JSON.parse(roomData);
            if(room.players.length >= room.maxPlayers) {
                alert("MƏLUMAT: Otaq artıq doludur!");
                return;
            }

            // Keçid
            location.href = "yarat.html?join=" + code;
        }

        // Səhifə açılanda yoxla
        window.onload = checkAuth;
    </script>

</body>
</html>
