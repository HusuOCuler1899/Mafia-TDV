<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }
        .background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .background { width: 150%; height: 150%; background-image: url('babba.jpg'); background-size: cover; background-position: center; filter: brightness(0.7); position: absolute; top: -25%; left: -25%; }
        .overlay { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        h1 { font-size: 5rem; color: #ff0000; text-shadow: 2px 2px 10px #000; letter-spacing: 15px; margin-bottom: 30px; }
        input { padding: 15px; border: 2px solid #ff0000; background: rgba(0,0,0,0.5); color: white; outline: none; width: 300px; font-size: 1.2rem; text-align: center; }
        .ok-btn { padding: 15px 30px; background-color: #ff0000; color: white; border: none; cursor: pointer; font-weight: bold; }
        .action-buttons { display: flex; gap: 40px; margin-top: 20px; }
        .main-btn { padding: 20px 60px; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: 3px solid #ff0000; background: none; color: #ff0000; transition: 0.4s; text-transform: uppercase; }
        .main-btn:hover { background: #ff0000; color: white; }
        #joinPanel { display: none; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="background-container"><div class="background"></div></div>
    <div class="overlay">
        <h1>TDV-MAFIA</h1>
        
        <div id="authSection">
            <input type="text" id="nameInp" placeholder="LƏQƏBİNİZ...">
            <button class="ok-btn" onclick="login()">OK</button>
        </div>

        <div id="menuSection" style="display: none;">
            <div id="userDisplay" style="color:#4ade80; font-size:1.5rem; margin-bottom:20px;"></div>
            <div class="action-buttons" id="mainBtns">
                <button class="main-btn" onclick="location.href='yarat.html'">YARAT</button>
                <button class="main-btn" onclick="showJoin()">QOŞUL</button>
            </div>
            
            <div id="joinPanel">
                <input type="text" id="roomCodeInp" placeholder="KODU BURAYA YAZ">
                <div style="display: flex; gap: 10px;">
                    <button class="ok-btn" onclick="joinRoom()">DAXİL OL</button>
                    <button class="ok-btn" style="background:gray;" onclick="hideJoin()">GERİ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById("nameInp").value.trim();
            if(!name) return;
            localStorage.setItem("mafia_nickname", name);
            checkAuth();
        }

        function checkAuth() {
            const saved = localStorage.getItem("mafia_nickname");
            if(saved) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("menuSection").style.display = "block";
                document.getElementById("userDisplay").innerText = "AGENT: " + saved;
            }
        }

        function showJoin() { document.getElementById("mainBtns").style.display="none"; document.getElementById("joinPanel").style.display="flex"; }
        function hideJoin() { document.getElementById("mainBtns").style.display="flex"; document.getElementById("joinPanel").style.display="none"; }

        function joinRoom() {
            const code = document.getElementById("roomCodeInp").value.trim().toUpperCase();
            const roomData = localStorage.getItem("room_" + code);
            
            if(!roomData) {
                alert("XƏTA: Otaq tapılmadı! Kodu düz yazdığınızdan əmin olun.");
                return;
            }

            const room = JSON.parse(roomData);
            if(room.players.length >= room.maxPlayers) {
                alert("WARNING: Otaq doludur!");
                return;
            }

            location.href = "yarat.html?join=" + code;
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
