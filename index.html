<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Əgər şəkil index.html ilə eyni yerdədirsə, sadəcə adını yaz */
    background-image: url('0d83b00a-5138-43ea-94d0-c321ce88b455'); 
    background-size: cover;
    background-position: center;
    filter: brightness(0.4); 
    z-index: -1;
}

        .overlay {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-shadow: 0 0 15px red;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #555;
            text-align: center;
            margin-bottom: 40px;
        }

        #usernameDisplay {
            margin-bottom: 15px;
            font-weight: bold;
            color: #4ade80;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 200px;
            outline: none;
        }

        .ok-btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            background-color: white; /* Rəngi sən dəyişərsən */
            transition: 0.3s;
        }

        .action-buttons {
            display: flex;
            gap: 25px;
        }

        .main-btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.4s;
        }

        /* Düymə rəngləri üçün yerlər (Mən müvəqqəti qoydum) */
        .yarat { background-color: #880808; color: red; }
        .kodla { background-color: #880808; color: red; }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="overlay">
        <h1>TDV-MAFIA</h1>

        <div class="login-box" id="loginArea">
            <div id="usernameDisplay"></div>
            <div id="inputGroup">
                <input type="text" id="usernameInput" placeholder="Ad seç...">
                <button class="ok-btn" onclick="saveUser()">OK</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="main-btn yarat" onclick="yaratScreen()">YARAT</button>
            <button class="main-btn kodla">KODLA QOŞUL</button>
        </div>
    </div>

    <script>
        // Sayt açılanda yaddaşda ad olub olmadığını yoxla
        window.onload = function() {
            let savedName = localStorage.getItem("mafia_username");
            if(savedName) {
                showName(savedName);
            }
        }

        function saveUser() {
            let input = document.getElementById("usernameInput").value.trim();
            if(input === "") return;

            // 1 adamın 1 adı istifadə etməsi (Local simulyasiya)
            // Real sistemdə bu bazadan yoxlanmalıdır, amma biz burda random rəqəm əlavə edirik
            let finalName = input;
            
            // Əgər ad artıq yaddaşda varsa və yeni ad daxil edilirsə, fərqlilik üçün rəqəm atırıq
            let randomNum = Math.floor(100 + Math.random() * 900);
            finalName = input + randomNum;

            localStorage.setItem("mafia_username", finalName);
            showName(finalName);
        }

        function showName(name) {
            document.getElementById("usernameDisplay").innerText = "Oyunçu: " + name;
            document.getElementById("inputGroup").style.display = "none";
        }

        function yaratScreen() {
            // "YARAT" üçün yeni ekran buraya gələcək
            alert("YARAT ekranı üçün hazırlıq görülür...");
        }
    </script>
</body>
</html>
