<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GECƏ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body, html { height: 100%; background-color: #000; color: white; overflow-x: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.15); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0, 50, 150, 0.3); border-bottom: 2px solid #0055ff; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #45f3ff; text-transform: uppercase; }
        .timer-box { font-size: 1.8rem; font-weight: bold; color: #ffeb3b; }
        
        .header-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; box-shadow: 0 0 10px red; }
        
        .main-area { display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 70vh; }
        
        /* 5x6 CƏDVƏL SİSTEMİ */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 75vh; margin-top: 10px; }
        .player-card { background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; text-align: center; transition: 0.2s; position: relative; }
        .player-card.active-turn { border-color: #45f3ff; cursor: pointer; }
        .player-card.active-turn:hover { background: rgba(69, 243, 255, 0.2); }
        .player-card.selected { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); background: rgba(255, 0, 0, 0.3); }
        .player-card.dead { border-color: #ff0000; filter: grayscale(100%) opacity(0.5); pointer-events: none; }
        
        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        .p-status { font-size: 0.7rem; color: #ff0000; margin-top: 3px; font-weight: 900; }

        .action-btn { margin-top: 15px; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; display: none; box-shadow: 0 0 10px red; }
        #waitingText { margin-top: 15px; font-size: 1.2rem; color: #aaa; text-align: center; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; }

        /* Ölülər Çatı (Ghost Chat) */
        .chat-toggle-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; position:fixed; bottom:20px; right:20px; z-index:900; }
        .chat-toggle-btn.dead-mode { background: #ff0000; border-color: #ff0000; box-shadow: 0 0 10px red; }
        
        #chatPanel { position: fixed; bottom: 0; right: -350px; width: 300px; height: 400px; background: rgba(0,0,0,0.95); border: 2px solid #ff0000; border-bottom: none; border-radius: 10px 10px 0 0; transition: right 0.3s ease; display: flex; flex-direction: column; z-index: 1000; }
        #chatPanel.open { right: 20px; }
        .chat-header { background: #ff0000; color: white; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 0.85rem; color: #ddd; word-break: break-word; }
        .msg span { font-weight: bold; color: #ff4d4d; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        .chat-input-area input { flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; outline: none; }
        .chat-input-area button { background: #ff0000; color: white; border: none; padding: 0 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <script>
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { history.pushState(null, null, window.location.href); });
    </script>

    <div class="bg"></div>
    <header>
        <button class="header-btn" onclick="exitGame()">ÇIX (ÖL)</button>
        <div class="phase-title" id="phaseText">GECƏ BAŞLAYIR</div>
        <div class="timer-box" id="timerDisplay">--</div>
    </header>

    <div class="main-area">
        <div class="grid-container" id="playerGrid"></div>
        <div id="waitingText">Sistem qərar verir...</div>
        <button class="action-btn" id="actionBtn" onclick="submitNightAction()">HƏDƏFİ TƏSDİQLƏ</button>
    </div>

    <button class="chat-toggle-btn" id="chatBtn" onclick="toggleChat()">Çat (Bağlıdır)</button>
    <div id="chatPanel">
        <div class="chat-header" onclick="toggleChat()">ÖLÜLƏR ÇATI (Bağla)</div>
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj..." autocomplete="off">
            <button onclick="sendDeadMessage()">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let playersData = {};
        let deadPlayers = {};
        let rolesData = {};
        let myRole = "";
        let amIDead = false;
        
        let currentNightRole = "";
        let mySelectedTarget = null;
        let timerInterval = null;

        // Sənəddəki tam 21 mərhələli ardıcıllıq
        const NIGHT_SEQUENCE = [
            "Eros", "Qan Qardaşı", "Türmə rəisi", "Oğru", "Gözəlçə", "Hiyləgər Mafiya",
            "Vəkil", "Həkim", "Cismani mühafizəçi", "Fedai", "Nəzarətçi", "Xəfiyyə Mafiya",
            "Jurnalist", "Keşiş", "Detektiv", "Medyum", "Zəhərləyici", "Psixopat",
            "Mafiya Komandası", "Yaddaşsız"
        ];

        db.ref('rooms/' + code).once('value', snap => {
            const room = snap.val();
            if(!room) return;

            isHost = (room.host === me);
            playersData = room.players || {};
            rolesData = room.assignedRoles || {};
            myRole = rolesData[safeMe] || "Dinc Sakin";

            if(isHost) {
                db.ref('rooms/' + code + '/nightActions').remove();
                processNightTurn(0);
            }
            listenToRoomUpdates();
        });

        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;

                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                amIDead = !!deadPlayers[safeMe];
                setupDeadChat();

                if(room.currentNightRole && room.currentNightRole !== currentNightRole) {
                    currentNightRole = room.currentNightRole;
                    handleTurnChange(room);
                }

                if(room.gameState === 'day_discuss') {
                    window.location.href = "oyun.html?join=" + code;
                }

                buildGrid();
            });
        }

        // --- HOST ÜÇÜN AVTOMATİK GECƏ DÖNGÜSÜ ---
        function processNightTurn(index) {
            if(!isHost) return;

            // Bütün rollar bitdikdə NƏTİCƏLƏR HESABLANIR və GÜNDÜZƏ QAYIDILIR
            if(index >= NIGHT_SEQUENCE.length) {
                calculateNightResults();
                return;
            }

            const roleToCheck = NIGHT_SEQUENCE[index];
            let isRoleAlive = false;
            
            if(roleToCheck === "Mafiya Komandası") {
                const mafiaRoles = ["Sadə Mafiya", "Don", "Aypara", "Gizli Mafiya", "Xəfiyyə Mafiya", "Hiyləgər Mafiya"];
                Object.keys(rolesData).forEach(p => { if(mafiaRoles.includes(rolesData[p]) && !deadPlayers[p]) isRoleAlive = true; });
            } else {
                Object.keys(rolesData).forEach(p => { if(rolesData[p] === roleToCheck && !deadPlayers[p]) isRoleAlive = true; });
            }

            // O roldan canlı adam yoxdursa 0 saniyə gözləyir, anında keçir!
            if(!isRoleAlive) {
                processNightTurn(index + 1);
                return;
            }

            // Varsa, 15 saniyə vaxt verir
            db.ref('rooms/' + code).update({
                currentNightRole: roleToCheck,
                phaseEndTime: Date.now() + 15000,
                nightIndex: index
            });
        }

        // --- OYUNÇU UI YENİLƏNMƏSİ ---
        function handleTurnChange(room) {
            clearInterval(timerInterval);
            mySelectedTarget = null;
            const endTime = room.phaseEndTime || 0;
            const isMyTurn = checkIsMyTurn(currentNightRole);

            if(isMyTurn && !amIDead) {
                document.getElementById('phaseText').innerText = `NÖVBƏ SƏNDƏDİR! HƏDƏF SEÇ`;
                document.getElementById('phaseText').style.color = "#ff0000";
                document.getElementById('waitingText').style.display = "none";
                document.getElementById('actionBtn').style.display = "block";
            } else {
                document.getElementById('phaseText').innerText = `SIRA: ${currentNightRole}`;
                document.getElementById('phaseText').style.color = "#45f3ff";
                document.getElementById('waitingText').style.display = "block";
                document.getElementById('waitingText').innerText = "Sistem və digər rollar qərar verir. Zəhmət olmasa gözləyin...";
                document.getElementById('actionBtn').style.display = "none";
            }

            timerInterval = setInterval(() => {
                let timeLeft = Math.ceil((endTime - Date.now()) / 1000);
                if(timeLeft < 0) timeLeft = 0;
                document.getElementById('timerDisplay').innerText = timeLeft;

                if(timeLeft <= 0 && isHost) {
                    clearInterval(timerInterval);
                    processNightTurn((room.nightIndex || 0) + 1);
                }
            }, 1000);
        }

        function checkIsMyTurn(turnRole) {
            if(turnRole === "Mafiya Komandası") {
                const mafiaRoles = ["Sadə Mafiya", "Don", "Aypara", "Gizli Mafiya", "Xəfiyyə Mafiya", "Hiyləgər Mafiya"];
                return mafiaRoles.includes(myRole);
            }
            return turnRole === myRole;
        }

        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);
            const isMyTurn = checkIsMyTurn(currentNightRole);

            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';

                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];
                    card.id = "card_" + sName;

                    if(deadPlayers[sName]) {
                        card.classList.add('dead');
                        card.innerHTML = `<div class="p-name">${pName}</div><div class="p-status">[ ÖLÜ ]</div>`;
                    } else {
                        card.innerHTML = `<div class="p-name">${pName}</div>`;
                        if(isMyTurn && !amIDead && sName !== safeMe) {
                            card.classList.add('active-turn');
                            card.onclick = () => selectTarget(sName);
                        }
                    }

                    if(mySelectedTarget === sName) card.classList.add('selected');
                } else {
                    card.style.visibility = "hidden";
                }
                grid.appendChild(card);
            }
        }

        function selectTarget(targetSafeName) {
            mySelectedTarget = targetSafeName;
            buildGrid();
        }

        function submitNightAction() {
            if(!mySelectedTarget) { alert("Bir hədəf seçin!"); return; }
            db.ref('rooms/' + code + '/nightActions/' + safeMe).set({
                role: myRole,
                turnGroup: currentNightRole,
                target: mySelectedTarget
            });
            document.getElementById('actionBtn').style.display = "none";
            document.getElementById('waitingText').style.display = "block";
            document.getElementById('waitingText').innerText = "Hərəkət qeydə alındı!";
        }

        function exitGame() {
            if(confirm("Oyundan çıxsanız ölü sayılacaqsınız. Əminsiniz?")) {
                db.ref('rooms/' + code + '/deadPlayers/' + safeMe).set(true).then(() => { window.location.href = "index.html"; });
            }
        }

        // --- GECƏNİN NƏTİCƏLƏRİNİN HESABLANMASI (QISALTMA OLMADAN, HƏYATİ MƏNTİQ) ---
        function calculateNightResults() {
            db.ref('rooms/' + code + '/nightActions').once('value', snap => {
                const actions = snap.val() || {};
                
                let blockedPlayers = [];
                let protectedPlayers = [];
                let mafiaTargetCounts = {};
                let finalMafiaTarget = null;
                let psixopatTarget = null;
                let detektivTarget = null;
                let newDead = {};

                // 1. Əvvəlcə bloklayanları (Oğru, Türmə Rəisi) və Qoruyanları (Həkim, Vəkil) tapırıq
                for(let p in actions) {
                    let act = actions[p];
                    if(act.role === "Oğru" || act.role === "Türmə rəisi") { blockedPlayers.push(act.target); }
                    if(act.role === "Həkim" || act.role === "Cismani mühafizəçi" || act.role === "Fedai" || act.role === "Vəkil" || act.role === "Gözəlçə") {
                        protectedPlayers.push(act.target);
                    }
                }

                // 2. Qatillərin hədəflərini təyin edirik (Bloklanan qatil hərəkət edə bilməz)
                for(let p in actions) {
                    let act = actions[p];
                    if(blockedPlayers.includes(p)) continue; // Bloklanıb

                    if(act.turnGroup === "Mafiya Komandası") {
                        mafiaTargetCounts[act.target] = (mafiaTargetCounts[act.target] || 0) + 1;
                    }
                    if(act.role === "Psixopat") psixopatTarget = act.target;
                    if(act.role === "Detektiv") detektivTarget = act.target; // Detektiv güllə atıbsa
                }

                // Mafiyanın ümumi qərarı
                let maxM = 0;
                for(let t in mafiaTargetCounts) {
                    if(mafiaTargetCounts[t] > maxM) { maxM = mafiaTargetCounts[t]; finalMafiaTarget = t; }
                }

                // 3. Ölümlərin Tətbiqi (Qorunmayanlar ölür)
                if(finalMafiaTarget && !protectedPlayers.includes(finalMafiaTarget)) newDead[finalMafiaTarget] = true;
                if(psixopatTarget && !protectedPlayers.includes(psixopatTarget)) newDead[psixopatTarget] = true;
                if(detektivTarget && !protectedPlayers.includes(detektivTarget)) newDead[detektivTarget] = true;

                // Nəticə Mətninin Hazırlanması
                let killedNames = [];
                for(let d in newDead) {
                    if(playersData[d]) killedNames.push(playersData[d]);
                }
                
                let summaryText = "Gecə sakit keçdi. Heç kim ölmədi.";
                if(killedNames.length > 0) summaryText = `Gecə hücumları nəticəsində öldürülənlər: ${killedNames.join(', ')}`;

                // Bazaya Ölənləri, Nəticə Mətnini yazırıq və Gündüzə (oyun.html) qayıdırıq
                let updates = { 
                    gameState: 'day_discuss', 
                    currentNightRole: null,
                    lastNightSummary: summaryText,
                    nightCounter: Math.floor(Math.random() * 10000) // Trigger üçün
                };
                
                for(let d in newDead) {
                    updates['deadPlayers/' + d] = true;
                }

                db.ref('rooms/' + code).update(updates);
            });
        }

        // --- GHOST CHAT MƏNTİQİ ---
        function setupDeadChat() {
            const chatBtn = document.getElementById('chatBtn');
            if(amIDead) {
                chatBtn.innerText = "ÖLÜLƏR ÇATI (AÇ)";
                chatBtn.classList.add('dead-mode');
                chatBtn.onclick = toggleChat;
            } else {
                chatBtn.innerText = "ÇAT (BAĞLIDIR)";
                chatBtn.classList.remove('dead-mode');
                chatBtn.onclick = () => alert("Siz sağsınız! Çat yalnız ölülər üçündür.");
                document.getElementById('chatPanel').classList.remove('open');
            }
        }

        function toggleChat() {
            if(!amIDead) return;
            document.getElementById('chatPanel').classList.toggle('open');
        }

        function sendDeadMessage() {
            if(!amIDead) return;
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;
            db.ref('rooms/' + code + '/deadChat').push({ sender: me, msg: txt });
            input.value = "";
        }

        document.getElementById('chatInput').addEventListener("keypress", function(e) {
            if(e.key === "Enter") { e.preventDefault(); sendDeadMessage(); }
        });

        db.ref('rooms/' + code + '/deadChat').on('child_added', snap => {
            const data = snap.val();
            const box = document.getElementById('chatMessages');
            box.innerHTML += `<div class="msg"><span>[Ruh] ${data.sender}:</span> ${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
