<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia LAB - Gecə Fazası</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1;
            margin-bottom: 5px;
        }

        #phase-title {
            color: #45f3ff;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .main-panel {
            background-color: #1f2833;
            border: 2px solid #45f3ff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .chat-panel {
            background-color: #1f2833;
            border: 2px solid #1f2833;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .dead-chat-title {
            color: #ff4d4d;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #ff4d4d;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #0b0c10;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ff4d4d;
        }

        .msg {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg-dead {
            color: #ff9999;
        }

        .chat-input-area {
            display: flex;
            gap: 5px;
        }

        .chat-input-area input {
            flex-grow: 1;
            background-color: #0b0c10;
            border: 1px solid #ff4d4d;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        .chat-input-area button {
            background-color: #ff4d4d;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .status-box {
            background-color: #0b0c10;
            border-left: 5px solid #66fcf1;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 18px;
            border-radius: 0 5px 5px 0;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .player-card {
            background-color: #0b0c10;
            border: 1px solid #c5c6c7;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player-card:hover:not(.dead):not(.disabled) {
            border-color: #66fcf1;
            box-shadow: 0 0 10px #66fcf1;
            background-color: #1f2833;
        }

        .player-card.dead {
            border-color: #ff4d4d;
            background-color: #2a1b1b;
            color: #ff4d4d;
            cursor: not-allowed;
            font-weight: bold;
        }

        .player-card.selected {
            border-color: #45f3ff;
            background-color: #1f2833;
            box-shadow: 0 0 15px #45f3ff;
        }

        .action-btn {
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
            display: none;
            width: 100%;
        }

        .action-btn:hover {
            background-color: #45f3ff;
        }

        .info-text {
            font-size: 16px;
            line-height: 1.6;
            color: #c5c6c7;
        }

        .system-log {
            color: #858585;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>MAFIA LAB</h1>
    <div id="phase-title">GECƏ - Növbə: Sadə Mafiya & Don</div>

    <div class="container">
        <div class="main-panel">
            <div id="status-container" class="status-box">
                Hazırda cari rolun hərəkəti gözlənilir...
            </div>

            <div id="action-instruction" class="info-text">
                Zəhmət olmasa, gecə hərəkətini yerinə yetirmək üçün aşağıdakı cədvəldən hədəf seçin.
            </div>

            <div id="player-zone" class="player-grid">
                </div>

            <button id="submit-action-btn" class="action-btn" onclick="processCurrentTurnAction()">HƏRƏKƏTİ TƏSDİQLƏ</button>
        </div>

        <div class="chat-panel">
            <div class="dead-chat-title">ÖLÜLƏRİN GİZLİ ÇATI (GHOST CHAT)</div>
            <div id="chat-messages">
                </div>
            <div class="chat-input-area">
                <input type="text" id="dead-msg-input" placeholder="Yalnız ölülərin görəcəyi mesaj yazın..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendDeadMessage()">Göndər</button>
            </div>
        </div>
    </div>

    <script>
        // Ssenari sənədindəki dəqiq sıra ilə sıralanmış bütün rollar sxemi
        const roleSequence = [
            { id: 1, name: "Sadə Mafiya", type: "mafia_team" },
            { id: 2, name: "Don", type: "mafia_team" },
            { id: 3, name: "Vəkil", type: "vəkil" },
            { id: 4, name: "Aypara", type: "aypara" },
            { id: 5, name: "Xəfiyyə Mafiya", type: "mafia_team" },
            { id: 6, name: "Hiyləgər Mafiya", type: "mafia_team" },
            { id: 7, name: "Psixopat", type: "psixopat" },
            { id: 8, name: "Zəhərləyici", type: "zəhərləyici" },
            { id: 9, name: "Canlı Bomba", type: "canlı_bomba" },
            { id: 10, name: "Oğru", type: "oğru" },
            { id: 11, name: "Həkim", type: "həkim" },
            { id: 12, name: "Detektiv", type: "detektiv" },
            { id: 13, name: "Keşiş", type: "keşiş" },
            { id: 14, name: "Cismani mühafizəçi", type: "muhafizeci" },
            { id: 15, name: "Bələdiyyə Sədri", type: "sedr" },
            { id: 16, name: "Jurnalist", type: "jurnalist" },
            { id: 17, name: "Türmə rəisi", type: "turme" },
            { id: 18, name: "Gözəlçə", type: "gozelce" },
            { id: 19, name: "Eros", type: "eros" },
            { id: 20, name: "Aşiqlər", type: "asiqler" },
            { id: 21, name: "Fenomen", type: "fenomen" },
            { id: 22, name: "Fedai", type: "fedai" },
            { id: 23, name: "Yaddaşsız", type: "yaddassiz" },
            { id: 24, name: "Gizli Polis", type: "gizli_polis" },
            { id: 25, name: "Qan Qardaşı", type: "qan_qardasi" },
            { id: 26, name: "Hakim", type: "hakim" },
            { id: 27, name: "Nəzarətçi", type: "nezaretci" }
        ];

        // Test məqsədli lokal data (oyun.html səhifəsindən localStorage və ya state vasitəsilə ötürülən məlumatlar)
        // Real tətbiqdə bu məlumatlar localStorage.getItem("players")-dən oxunacaq.
        let players = JSON.parse(localStorage.getItem("gameStatePlayers")) || [
            { id: 1, name: "Huseyn Aga", role: "Don", isAlive: true },
            { id: 2, name: "Elvin", role: "Sadə Mafiya", isAlive: true },
            { id: 3, name: "Arif", role: "Həkim", isAlive: true },
            { id: 4, name: "Aydan", role: "Detektiv", isAlive: true },
            { id: 5, name: "Ramil", role: "Vəkil", isAlive: false }, // Ölü nümunə
            { id: 6, name: "Natiq", role: "Keşiş", isAlive: true },
            { id: 7, name: "Leyla", role: "Psixopat", isAlive: true },
            { id: 8, name: "Zaur", role: "Cismani mühafizəçi", isAlive: false }, // Ölü nümunə
            { id: 9, name: "Elnur", role: "Oğru", isAlive: true },
            { id: 10, name: "Səbinə", role: "Gözəlçə", isAlive: true }
        ];

        // Hazırda bu kompüterdə/ekranda oturan real oyunçunun obyekti
        // Məsələn, yoxlamaq üçün özümüzü "Don" edək və ya ölü edib test edə bilərik.
        let currentPlayer = { id: 1, name: "Huseyn Aga", role: "Don", isAlive: true };

        let currentSequenceIndex = 0; 
        let selectedPlayerId = null;
        let nightActionsLog = []; // Gecə baş verən hərəkətlərin yaddaşı (oyun.html-ə ötürmək üçün)

        // Səhifə yüklənəndə işə düşən funksiya
        window.onload = function() {
            renderPlayerGrid();
            initDeadChat();
            runNightCycle();
        };

        // Oyunçu cədvəlini ekrana çəkmək (oyun.html üslubunda)
        function renderPlayerGrid() {
            const playerZone = document.getElementById("player-zone");
            playerZone.innerHTML = "";

            players.forEach(p => {
                const card = document.createElement("div");
                card.className = "player-card";
                
                if (!p.isAlive) {
                    card.classList.add("dead");
                    card.innerHTML = `<div>${p.name}</div><div style='font-size:12px; margin-top:5px;'>[ ÖLÜ ]</div>`;
                } else {
                    card.innerHTML = `<div>${p.name}</div>`;
                    
                    // Klikləmə hadisəsi
                    card.onclick = function() {
                        selectPlayer(p.id, card);
                    };
                }
                card.setAttribute("data-id", p.id);
                playerZone.appendChild(card);
            });
        }

        // Cədvəldən oyunçu seçilməsi məntiqi
        function selectPlayer(id, cardElement) {
            // Əgər hazırkı növbədə olan rolun seçim etmək hüququ yoxdursa və ya oyunçu özü ölüdürsə imkan vermə
            if (!currentPlayer.isAlive) return;

            const currentRoleObj = roleSequence[currentSequenceIndex];
            
            // Hazırkı oyunçunun rolu ilə sıradakı rol uyğun gəlmirsə seçimi blokla (izləyici modundadırsa)
            if (currentPlayer.role !== currentRoleObj.name && !(currentRoleObj.type === "mafia_team" && isMafiaTeam(currentPlayer.role))) {
                return; 
            }

            // Əvvəlki seçilmiş kartı təmizlə
            const previousSelected = document.querySelector(".player-card.selected");
            if (previousSelected) {
                previousSelected.classList.remove("selected");
            }

            selectedPlayerId = id;
            cardElement.classList.add("selected");
        }

        // Oyunçunun Mafiya komandasında olub-olmadığını yoxlayan köməkçi funksiya
        function isMafiaTeam(roleName) {
            const mafiaRoles = ["Sadə Mafiya", "Don", "Vəkil", "Aypara", "Xəfiyyə Mafiya", "Hiyləgər Mafiya"];
            return mafiaRoles.includes(roleName);
        }

        // Hər hansı bir rola malik canlı oyunçu varmı deyə yoxlamaq
        function isRoleAliveAndPresent(roleName) {
            return players.some(p => p.role === roleName && p.isAlive);
        }

        // Gecə döngüsünü idarə edən əsas funksiya
        function runNightCycle() {
            if (currentSequenceIndex >= roleSequence.length) {
                // Bütün növbələr bitdi! Yenidən oyun.html səhifəsinə qayıdırıq
                endNightAndRedirect();
                return;
            }

            const currentRole = roleSequence[currentSequenceIndex];
            const phaseTitleElement = document.getElementById("phase-title");
            const statusContainer = document.getElementById("status-container");
            const actionInstruction = document.getElementById("action-instruction");
            const submitBtn = document.getElementById("submit-action-btn");

            phaseTitleElement.innerText = `GECƏ - Növbə: ${currentRole.name}`;
            
            // Seçimi sıfırla
            selectedPlayerId = null;
            const previousSelected = document.querySelector(".player-card.selected");
            if (previousSelected) previousSelected.classList.remove("selected");

            // Qayda 1: Əgər bu rola sahib oyunçu oyunda yoxdursa və ya ÖLÜBSƏ, bu sıra heç nə etmədən avtomatik keçir
            if (!isRoleAliveAndPresent(currentRole.name)) {
                console.log(`${currentRole.name} ölüb və ya oyunda yoxdur. Sıra keçir.`);
                currentSequenceIndex++;
                runNightCycle(); // Növbəti rola keç
                return;
            }

            // Qayda 2: Əgər sıra gələn rol hazırkı ekranda oturan oyunçunun özüdürsə (yaxud mafiya komandasındandırsa və sıra mafiyadadırsa)
            const isMyTurn = (currentPlayer.role === currentRole.name) || 
                             (currentRole.type === "mafia_team" && isMafiaTeam(currentPlayer.role));

            if (isMyTurn && currentPlayer.isAlive) {
                // Aktiv hərəkət edən oyunçu ekranı
                statusContainer.innerHTML = `<strong>Sizin Növbənizdir!</strong> Rolunuz: <span style='color:#45f3ff'>${currentPlayer.role}</span>`;
                actionInstruction.innerHTML = `Sənəddəki funksiyanıza uyğun olaraq cədvəldən bir oyunçu üzərinə klikləyin və təsdiqləyin.`;
                submitBtn.style.display = "block";
            } else {
                // Digər gözləyən oyunçuların ekranı
                submitBtn.style.display = "none";
                
                if (currentRole.type === "mafia_team") {
                    statusContainer.innerHTML = `Gecə əməliyyatı aparılır...`;
                    actionInstruction.innerHTML = `<span style='color:#ff4d4d'>Mafiya və Don</span> hazırda qurban seçir. Digər oyunçular gözləyir...`;
                } else {
                    statusContainer.innerHTML = `Gecə əməliyyatı aparılır...`;
                    actionInstruction.innerHTML = `<span style='color:#66fcf1'>${currentRole.name}</span> hazırda öz işini görür. Zəhmət olmasa gözləyin...`;
                }

                // Sistem simulyasiyası: Digər oyunçuların hərəkətini avtomatik idarə etmək üçün (Müştəri-Server arxitekturası yoxdursa test üçün 3 saniyə gözləyir)
                setTimeout(() => {
                    simulateAIOrExternalPlayerAction(currentRole.name);
                }, 3000);
            }
        }

        // Aktiv oyunçu hərəkəti yerinə yetirib düyməni basdıqda işləyən funksiya
        function processCurrentTurnAction() {
            const currentRole = roleSequence[currentSequenceIndex];

            if (selectedPlayerId === null) {
                alert("Zəhmət olmasa, hərəkət etmək üçün cədvəldən bir oyunçu seçin!");
                return;
            }

            const targetPlayer = players.find(p => p.id === selectedPlayerId);

            // Gecə loglarına yazırıq
            nightActionsLog.push({
                byRole: currentRole.name,
                targetId: targetPlayer.id,
                targetName: targetPlayer.name
            });

            alert(`Hərəkət uğurla icra olundu: ${currentRole.name} -> Hədəf: ${targetPlayer.name}`);

            // Növbəti rola keçirik
            currentSequenceIndex++;
            runNightCycle();
        }

        // Digər oyunçuların/AI-ın növbəsini simulyasiya edən funksiya
        function simulateAIOrExternalPlayerAction(roleName) {
            // Əgər simulyasiya anında artıq növbə dəyişibsə funksiyanı dayandır
            if (roleSequence[currentSequenceIndex].name !== roleName) return;

            // Canlı oyunçulardan random birini hədəf seç
            const alivePlayers = players.filter(p => p.isAlive);
            if (alivePlayers.length > 0) {
                const randomTarget = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                
                nightActionsLog.push({
                    byRole: roleName,
                    targetId: randomTarget.id,
                    targetName: randomTarget.name
                });
                
                console.log(`Sistem tərəfindən icra olundu: ${roleName} -> Hədəf: ${randomTarget.name}`);
            }

            currentSequenceIndex++;
            runNightCycle();
        }

        // Gecə bitəndə bütün datanı yadda saxlayıb oyun.html səhifəsinə yönləndirən funksiya
        function endNightAndRedirect() {
            alert("Gecə bitdi! Bütün rollar öz işini tamamladı. Günəş doğur...");
            
            // Gecə baş verən ölümləri və hadisələri hesablamaq üçün logu ötürürük
            // Məsələn: Mafiya kimi seçibsə o adamın vəziyyətini real tətbiqdə burda dəyişirik:
            const mafiaAction = nightActionsLog.find(a => a.byRole === "Sadə Mafiya" || a.byRole === "Don");
            const doctorAction = nightActionsLog.find(a => a.byRole === "Həkim");

            if (mafiaAction) {
                // Əgər həkim eyni adamı müalicə etməyibsə, həmin adam ölüb
                if (doctorAction && doctorAction.targetId === mafiaAction.targetId) {
                    // Həkim xilas etdi, heç kim ölmədi
                    localStorage.setItem("lastNightDeath", "none");
                } else {
                    // Mafiyanın vurduğu adam öldü
                    const killedPlayer = players.find(p => p.id === mafiaAction.targetId);
                    if (killedPlayer) {
                        killedPlayer.isAlive = false;
                        localStorage.setItem("lastNightDeath", killedPlayer.name);
                    }
                }
            }

            // Yenilənmiş oyunçu siyahısını və logları localyaddaşa yazırıq ki oyun.html oxuya bilsin
            localStorage.setItem("gameStatePlayers", JSON.stringify(players));
            localStorage.setItem("nightActionsLog", JSON.stringify(nightActionsLog));

            // oyun.html səhifəsinə geri qayıdış (Döngü təmin olunur)
            window.location.href = "oyun.html";
        }

        // --- AMONG US TIPLI ÖLÜLƏR ÇATI MEXANİZMİ ---
        
        function initDeadChat() {
            const chatMessages = document.getElementById("chat-messages");
            
            // Əgər oyunçu sağdırsa, Among Us-dakı kimi ölü çatını görməməlidir
            if (currentPlayer.isAlive) {
                chatMessages.innerHTML = `<div class='system-log' style='color:#ff4d4d; text-align:center;'>Siz SAĞSINIZ. Ölülərin ruhlarının çışmalarını eşidə bilməzsiniz!</div>`;
                document.getElementById("dead-msg-input").disabled = true;
                document.getElementById("dead-msg-input").placeholder = "Yalnız ölülər bura yaza bilər...";
            } else {
                chatMessages.innerHTML = `<div class='system-log' style='color:#00ff00; text-align:center;'>Siz ÖLDÜNÜZ. Ghost Chat aktivdir. Digər ölülərlə danışın!</div>`;
            }

            // Əvvəllər yazılmış ölü mesajlarını localStoragedan yükləyək
            loadDeadMessages();
        }

        function loadDeadMessages() {
            // Əgər canlıdırsa mesajların məzmununu yükləmə və göstərmə
            if (currentPlayer.isAlive) return;

            const savedMsgs = JSON.parse(localStorage.getItem("ghostChatMessages")) || [];
            const chatMessages = document.getElementById("chat-messages");
            
            // Başlanğıc bildirişindən sonrakıları təmizlə və yenidən yaz
            chatMessages.innerHTML = `<div class='system-log' style='color:#00ff00; text-align:center;'>Siz ÖLDÜNÜZ. Ghost Chat aktivdir.</div>`;
            
            savedMsgs.forEach(m => {
                const msgDiv = document.createElement("div");
                msgDiv.className = "msg msg-dead";
                msgDiv.innerHTML = `<strong>[Ruh] ${m.sender}:</strong> ${m.text}`;
                chatMessages.appendChild(msgDiv);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendDeadMessage() {
            // Əgər oyunçu sağdırsa mesaj göndərə bilməz
            if (currentPlayer.isAlive) {
                alert("Canlı oyunçular ölülər çatına mesaj göndərə bilməz!");
                return;
            }

            const inputElement = document.getElementById("dead-msg-input");
            const text = inputElement.value.trim();
            
            if (text === "") return;

            const savedMsgs = JSON.parse(localStorage.getItem("ghostChatMessages")) || [];
            
            const newMsg = {
                sender: currentPlayer.name,
                text: text,
                time: new Date().toLocaleTimeString()
            };

            savedMsgs.push(newMsg);
            localStorage.setItem("ghostChatMessages", JSON.stringify(savedMsgs));

            inputElement.value = "";
            loadDeadMessages(); // Çatı yenilə
        }

        function handleChatKeyPress(event) {
            if (event.key === "Enter") {
                sendDeadMessage();
            }
        }
    </script>
</body>
</html>
