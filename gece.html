<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GECƏ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Şriftlər və Ümumi Dizayn (oyun.html ilə eyni) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.15); }
        
        /* Üst Panel */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0, 100, 255, 0.1); border-bottom: 2px solid #0055ff; height: 60px; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #45f3ff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(69, 243, 255, 0.5); }
        .timer-box { font-size: 1.8rem; font-weight: bold; color: #ffeb3b; text-shadow: 0 0 10px rgba(255, 235, 59, 0.5); }
        
        /* Cədvəl Dizaynı (oyun.html ilə eyni 30 nəfərlik grid) */
        .main-area { display: flex; flex-direction: column; align-items: center; height: calc(100% - 60px); padding: 10px; position: relative; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 80vh;
        }
        
        .player-card { 
            background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 5px; position: relative; transition: 0.2s; text-align: center;
        }
        .player-card.active-turn { cursor: pointer; }
        .player-card.active-turn:hover { border-color: #45f3ff; background: rgba(69, 243, 255, 0.2); }
        .player-card.selected-target { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); background: rgba(255, 0, 0, 0.2); }
        .player-card.dead { filter: grayscale(100%) opacity(0.5); pointer-events: none; border-color: #111 !important; }
        
        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        .p-dead-text { font-size: 0.7rem; color: #ff0000; margin-top: 3px; font-weight: 900; }

        /* Hərəkəti Təsdiqlə Düyməsi */
        .action-btn { margin-top: 10px; background: #ff0000; color: white; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border: 2px solid #aa0000; border-radius: 5px; cursor: pointer; display: none; text-transform: uppercase; box-shadow: 0 0 10px red; }
        .action-btn:hover { background: #cc0000; }

        /* Gözləmə Mətni */
        #waitingText { margin-top: 15px; font-size: 1.2rem; color: #aaa; display: block; text-align: center; }

        /* Ölülər Çatı (Yalnız ölülər üçün açılır) */
        .chat-toggle-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .chat-toggle-btn.dead-mode { background: #ff0000; border-color: #ff0000; box-shadow: 0 0 10px red; }
        
        #chatPanel { 
            position: fixed; top: 60px; right: -350px; width: 300px; height: calc(100% - 60px); 
            background: rgba(0,0,0,0.95); border-left: 2px solid #ff0000; transition: right 0.3s ease; 
            display: flex; flex-direction: column; z-index: 1000; 
        }
        #chatPanel.open { right: 0; }
        .chat-header { background: #ff0000; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { font-size: 0.9rem; word-break: break-word; color: #ddd; }
        .msg span { font-weight: bold; color: #ff4d4d; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        .chat-input-area input { flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; outline: none; }
        .chat-input-area button { background: #ff0000; color: white; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }
        
        /* Tam Ekran Keçid (Oyun başlayanda / qurtaranda) */
        #transitionOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 4000; color: white; font-size: 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; transition: opacity 1s ease; }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg"></div></div>

    <div id="transitionOverlay">GECƏ ÇÖKÜR...</div>

    <header>
        <div class="phase-title" id="phaseText">GECƏ BAŞLAYIR</div>
        <div class="timer-box" id="timerDisplay">--</div>
        <button class="chat-toggle-btn" id="chatBtn" onclick="toggleChat()">Çat (Bağlıdır)</button>
    </header>

    <div class="main-area">
        <div class="grid-container" id="playerGrid"></div>
        <div id="waitingText">Hazırda başqaları hərəkət edir, gözləyin...</div>
        <button class="action-btn" id="actionBtn" onclick="submitAction()">HƏDƏFİ TƏSDİQLƏ</button>
    </div>

    <div id="chatPanel">
        <div class="chat-header">ÖLÜLƏR ÇATI (GHOST CHAT)</div>
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yaz..." autocomplete="off">
            <button onclick="sendDeadMessage()">GÖNDƏR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let playersData = {};
        let deadPlayers = {};
        let rolesData = {};
        let myRole = "";
        let amIDead = false;
        
        let currentNightRole = "";
        let selectedTarget = null;
        let timerInterval = null;

        // Sənəddəki tam dəqiq növbə ardıcıllığı
        const NIGHT_SEQUENCE = [
            "Eros", "Qan Qardaşı", "Türmə rəisi", "Oğru", "Gözəlçə", "Hiyləgər Mafiya",
            "Vəkil", "Həkim", "Cismani mühafizəçi", "Fedai", "Nəzarətçi", "Xəfiyyə Mafiya",
            "Jurnalist", "Keşiş", "Detektiv", "Medyum", "Zəhərləyici", "Psixopat",
            "Mafiya Komandası", "Yaddaşsız"
        ];

        // Səhifə açılanda dataları çəkirik
        db.ref('rooms/' + code).once('value', snapshot => {
            const room = snapshot.val();
            if(!room) { window.location.href = "index.html"; return; }

            isHost = (room.host === me);
            playersData = room.players || {};
            deadPlayers = room.deadPlayers || {};
            rolesData = room.assignedRoles || {};
            myRole = rolesData[safeMe] || "Dinc Sakin";
            amIDead = !!deadPlayers[safeMe];

            setupDeadChat();

            // Keçid ekranını yavaşca sil
            setTimeout(() => {
                const overlay = document.getElementById("transitionOverlay");
                overlay.style.opacity = "0";
                setTimeout(() => overlay.style.display = "none", 1000);
            }, 1500);

            // Host ilk gecə addımını başladır (Köhnə hərəkətləri təmizləyir)
            if(isHost) {
                db.ref('rooms/' + code + '/nightActions').remove();
                db.ref('rooms/' + code).update({ nightIndex: 0 });
                processNightTurn(0);
            }

            listenToRoomUpdates();
            listenToDeadChat();
        });

        // Otaq dəyişikliklərini canlı izləmə
        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;

                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                rolesData = room.assignedRoles || {};
                amIDead = !!deadPlayers[safeMe];

                // Gecə növbəsinin dəyişməsini izləyirik
                if(room.currentNightRole && room.currentNightRole !== currentNightRole) {
                    currentNightRole = room.currentNightRole;
                    handleTurnChange(room);
                }

                // Gündüzə keçid əmri gələrsə avtomatik oyun.html-ə qayıt
                if(room.gameState === 'day_discuss') {
                    document.getElementById("transitionOverlay").innerText = "GÜNƏŞ DOĞUR...";
                    document.getElementById("transitionOverlay").style.display = "flex";
                    document.getElementById("transitionOverlay").style.opacity = "1";
                    setTimeout(() => window.location.href = "oyun.html?join=" + code, 2000);
                }

                buildGrid();
            });
        }

        // --- HOST ÜÇÜN GECƏ DÖNGÜSÜ MƏNTİQİ ---
        function processNightTurn(index) {
            if(!isHost) return;

            // Bütün rollar bitdisə, Gecəni bağla və Gündüzə keç
            if(index >= NIGHT_SEQUENCE.length) {
                calculateNightResults();
                return;
            }

            const roleToCheck = NIGHT_SEQUENCE[index];
            
            // Həmin rolda olan sağ adam varmı?
            let isRoleAlive = false;
            
            if(roleToCheck === "Mafiya Komandası") {
                // Mafiyadan kimsə sağdırmı?
                const mafiaRoles = ["Sadə Mafiya", "Don", "Aypara", "Gizli Mafiya", "Xəfiyyə Mafiya", "Hiyləgər Mafiya"];
                Object.keys(rolesData).forEach(p => {
                    if(mafiaRoles.includes(rolesData[p]) && !deadPlayers[p]) isRoleAlive = true;
                });
            } else {
                // Xüsusi roldan sağ adam varmı?
                Object.keys(rolesData).forEach(p => {
                    if(rolesData[p] === roleToCheck && !deadPlayers[p]) isRoleAlive = true;
                });
            }

            // Əgər o roldan adam yoxdursa və ya ölübsə, heç gözləmədən avtomatik sıranı atla!
            if(!isRoleAlive) {
                db.ref('rooms/' + code).update({ nightIndex: index + 1 });
                processNightTurn(index + 1);
                return;
            }

            // Əgər sağ adam varsa, taymeri başlat və növbəni ona ver
            db.ref('rooms/' + code).update({
                currentNightRole: roleToCheck,
                phaseEndTime: Date.now() + 15000, // Hərəkət etmək üçün 15 saniyə vaxt
                nightIndex: index
            });
        }

        // --- OYUNÇU EKRANININ NÖVBƏYƏ GÖRƏ DƏYİŞMƏSİ ---
        function handleTurnChange(room) {
            clearInterval(timerInterval);
            selectedTarget = null;
            const endTime = room.phaseEndTime || 0;

            const isMyTurn = checkIsMyTurn(currentNightRole);

            if(isMyTurn && !amIDead) {
                document.getElementById('phaseText').innerText = `SƏNİN NÖVBƏNDİR! HƏDƏF SEÇ`;
                document.getElementById('phaseText').style.color = "#ff0000";
                document.getElementById('waitingText').style.display = "none";
                document.getElementById('actionBtn').style.display = "block";
            } else {
                document.getElementById('phaseText').innerText = `SIRA: ${currentNightRole.toUpperCase()}`;
                document.getElementById('phaseText').style.color = "#45f3ff";
                document.getElementById('waitingText').style.display = "block";
                document.getElementById('actionBtn').style.display = "none";
            }

            // Taymerin işləməsi
            timerInterval = setInterval(() => {
                let timeLeft = Math.ceil((endTime - Date.now()) / 1000);
                if(timeLeft < 0) timeLeft = 0;
                document.getElementById('timerDisplay').innerText = timeLeft;

                // Vaxt bitəndə Host avtomatik növbəti rola keçirir
                if(timeLeft <= 0 && isHost) {
                    clearInterval(timerInterval);
                    const nextIndex = (room.nightIndex || 0) + 1;
                    processNightTurn(nextIndex);
                }
            }, 1000);
        }

        // Mənim növbəm olub olmadığını yoxlayır
        function checkIsMyTurn(turnRole) {
            if(turnRole === "Mafiya Komandası") {
                const mafiaRoles = ["Sadə Mafiya", "Don", "Aypara", "Gizli Mafiya", "Xəfiyyə Mafiya", "Hiyləgər Mafiya"];
                return mafiaRoles.includes(myRole);
            }
            return turnRole === myRole;
        }

        // --- CƏDVƏLİN QURULMASI (oyun.html kimidir) ---
        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);

            const isMyTurn = checkIsMyTurn(currentNightRole);

            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';

                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];
                    card.id = "card_" + sName;

                    if(deadPlayers[sName]) {
                        card.classList.add('dead');
                        card.innerHTML = `<div class="p-name">${pName}</div><div class="p-dead-text">[ ÖLÜ ]</div>`;
                    } else {
                        card.innerHTML = `<div class="p-name">${pName}</div>`;
                        
                        // Yalnız mənim növbəmdirsə və mən sağamsa kartlara klikləyə bilərəm
                        if(isMyTurn && !amIDead && sName !== safeMe) {
                            card.classList.add('active-turn');
                            card.onclick = () => selectTarget(sName);
                        }
                    }

                    if(selectedTarget === sName) {
                        card.classList.add('selected-target');
                    }
                } else {
                    card.style.visibility = "hidden";
                }
                grid.appendChild(card);
            }
        }

        // Hədəf Seçimi
        function selectTarget(targetSafeName) {
            selectedTarget = targetSafeName;
            buildGrid(); // Təkrar rəngləmək üçün grid-i yeniləyirik
        }

        // Təsdiqlə Düyməsi
        function submitAction() {
            if(!selectedTarget) {
                alert("Hərəkət etmək üçün cədvəldən bir nəfər seçməlisiniz!");
                return;
            }

            // Hərəkəti bazaya yazırıq (Host sonda bunları oxuyacaq)
            db.ref('rooms/' + code + '/nightActions/' + safeMe).set({
                role: myRole,
                turnGroup: currentNightRole,
                target: selectedTarget
            });

            document.getElementById('actionBtn').style.display = "none";
            document.getElementById('waitingText').style.display = "block";
            document.getElementById('waitingText').innerText = "Hərəkət qeydə alındı, digərlərini gözləyin...";
        }

        // --- GECƏNİN NƏTİCƏLƏRİ VƏ GÜNDÜZƏ KEÇİD (Yalnız Host) ---
        function calculateNightResults() {
            db.ref('rooms/' + code + '/nightActions').once('value', snap => {
                const actions = snap.val() || {};
                let mafiaTargetCounts = {};
                let finalMafiaTarget = null;
                let maxVotes = 0;

                let doctorTarget = null;
                let psixopatTarget = null;

                // Hərəkətləri oxuyub analiz edirik
                for(let player in actions) {
                    const act = actions[player];
                    if(act.turnGroup === "Mafiya Komandası") {
                        mafiaTargetCounts[act.target] = (mafiaTargetCounts[act.target] || 0) + 1;
                        if(mafiaTargetCounts[act.target] > maxVotes) {
                            maxVotes = mafiaTargetCounts[act.target];
                            finalMafiaTarget = act.target;
                        }
                    }
                    if(act.role === "Həkim") {
                        doctorTarget = act.target;
                    }
                    if(act.role === "Psixopat") {
                        psixopatTarget = act.target;
                    }
                }

                // Ölüm qərarlarını tətbiq edirik
                let newDead = {};

                // Mafiya kimi vurdu? (Həkim qorumadısa ölür)
                if(finalMafiaTarget && finalMafiaTarget !== doctorTarget) {
                    newDead[finalMafiaTarget] = true;
                }
                
                // Psixopat kimi vurdu? (Həkim onu da qorumadısa ölür)
                if(psixopatTarget && psixopatTarget !== doctorTarget) {
                    newDead[psixopatTarget] = true;
                }

                // Bazada ölənləri yeniləyirik
                let updates = {};
                for(let d in newDead) {
                    updates['rooms/' + code + '/deadPlayers/' + d] = true;
                }

                // Və oyunu avtomatik Gündüz müzakirəsinə keçiririk
                updates['rooms/' + code + '/gameState'] = 'day_discuss';
                updates['rooms/' + code + '/phaseEndTime'] = Date.now() + 30000; // 30 saniyə müzakirə
                
                db.ref().update(updates);
            });
        }

        // --- AMONG US TİPLİ ÖLÜLƏR ÇATI ---
        function setupDeadChat() {
            const chatBtn = document.getElementById('chatBtn');
            if(amIDead) {
                chatBtn.innerText = "ÖLÜLƏR ÇATI";
                chatBtn.classList.add('dead-mode');
            } else {
                chatBtn.innerText = "ÇAT (BAĞLIDIR)";
                chatBtn.onclick = () => alert("Siz sağsınız. Çat ancaq ölülər üçündür!");
            }
        }

        function toggleChat() {
            if(!amIDead) return;
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('open');
        }

        function sendDeadMessage() {
            if(!amIDead) return;
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;

            db.ref('rooms/' + code + '/deadChat').push({
                sender: me,
                msg: txt,
                time: Date.now()
            });
            input.value = "";
        }

        document.getElementById('chatInput').addEventListener("keypress", function(e) {
            if(e.key === "Enter") { e.preventDefault(); sendDeadMessage(); }
        });

        function listenToDeadChat() {
            db.ref('rooms/' + code + '/deadChat').on('child_added', snap => {
                const data = snap.val();
                const box = document.getElementById('chatMessages');
                box.innerHTML += `<div class="msg"><span>[Ruh] ${data.sender}:</span> ${data.msg}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
