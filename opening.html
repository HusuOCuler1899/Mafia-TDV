<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROLUNUZ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body, html { height: 100%; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); z-index: -1; }
        
        /* Geri/脟谋x d眉ym蓹si */
        .exit-btn { position: fixed; top: 15px; left: 15px; background: #ff0000; color: white; border: none; padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; z-index: 100; }

        .envelope-container { text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 15px; border: 2px solid #ffaa00; box-shadow: 0 0 20px rgba(255, 170, 0, 0.5); z-index: 10; width: 90%; max-width: 800px; }
        .title { font-size: 1.5rem; margin-bottom: 20px; color: #ffaa00; text-transform: uppercase; letter-spacing: 2px; }
        
        #roleReveal { font-size: clamp(2rem, 6vw, 4rem); font-weight: bold; color: #ff0000; display: none; text-shadow: 0 0 15px red; margin: 20px 0; text-transform: uppercase; }
        #roleNote { font-size: 1.2rem; color: #ddd; display: none; margin-top: 15px; padding: 10px; border-left: 3px solid red; background: rgba(255,0,0,0.1); }
        
        button.action-btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background: #ffaa00; color: black; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button.action-btn:hover { background: #ffcc00; transform: scale(1.05); }

        .btn-continue { background: #00ff00; display: none; margin-top: 20px; box-shadow: 0 0 15px #00ff00; }
        .status-text { margin-top: 20px; color: #aaa; font-size: 1.1rem; display: none; }
    </style>
</head>
<body>
    <script>
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { history.pushState(null, null, window.location.href); });
    </script>

    <div class="bg"></div>
    <button class="exit-btn" onclick="exitGame()">OYUNDAN 脟IX (脰L脺 SAYIL)</button>

    <div class="envelope-container" id="roleBox">
        <div class="title">S蓹nin Rolun M眉蓹yy蓹nl蓹艧di</div>
        <button id="showRoleBtn" class="action-btn" onclick="showRole()">M茝XF陌 Z茝RF陌 A脟</button>
        <div id="roleReveal">ROL Y脺KL茝N陌R...</div>
        <div id="roleNote">...</div>
        
        <button class="action-btn btn-continue" id="hostProceedBtn" onclick="goToDayPhase()">SABAHI A脟 (Host)</button>
        <div class="status-text" id="waitingText">Hostun s蓹h蓹ri a莽mas谋 g枚zl蓹nilir...</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let myRole = "Dinc Sakin";

        // S蓹n蓹dd蓹ki b眉t眉n rollar谋n x眉susi notlar谋
        const roleNotes = {
            "Sad蓹 Mafiya": "Gec蓹l蓹r Mafiya komandas谋 il蓹 birlikd蓹 s蓹s ver蓹r蓹k 1 n蓹f蓹ri 枚ld眉r蓹n 蓹sas silahl谋 q眉vv蓹.",
            "Don": "Mafiyan谋n r蓹hb蓹ri. X蓹fiyy蓹l蓹r t蓹r蓹find蓹n yoxlan谋ld谋qda h蓹mi艧蓹 g眉nahs谋z 'Dinc sakin' olaraq g枚r眉n眉r.",
            "V蓹kil": "H蓹r gec蓹 bir mafiya 眉zv眉n眉 se莽蓹r蓹k onu h蓹m dig蓹r qatill蓹rd蓹n, h蓹m d蓹 Ke艧i艧in yoxlamalar谋ndan qoruyan m眉dafi蓹莽i.",
            "H蓹kim": "Gec蓹l蓹r qatill蓹rin h眉cumuna m蓹ruz qalanlar谋 h蓹yata qaytaran v蓹 枚l眉md蓹n xilas ed蓹n tibb i艧莽isi.",
            "Detektiv": "Gec蓹 yoxlama apararaq kimins蓹 rolunu 枚yr蓹n蓹 bil蓹n v蓹 ya ist蓹s蓹, silah谋n谋 istifad蓹 edib kimis蓹 vura bil蓹n polis."
            // Qeyd: S蓹n蓹dd蓹ki dig蓹r rollar谋n notlar谋n谋 da buraya eyni formatda uzada bil蓹rs蓹n. Y眉ng眉l olmas谋 眉莽眉n q谋sa versiya qoydum.
        };

        db.ref('rooms/' + code).once('value', snap => {
            const room = snap.val();
            if(!room) return;
            isHost = (room.host === me);
            myRole = room.assignedRoles[safeMe] || "Dinc Sakin";
            listenForPhaseChange();
        });

        function showRole() {
            document.getElementById('showRoleBtn').style.display = "none";
            document.getElementById('roleReveal').innerText = myRole;
            document.getElementById('roleReveal').style.display = "block";
            
            document.getElementById('roleNote').innerText = roleNotes[myRole] || "Sistem t蓹r蓹find蓹n t蓹yin olunan gizli rol.";
            document.getElementById('roleNote').style.display = "block";
            
            if(isHost) {
                document.getElementById('hostProceedBtn').style.display = "inline-block";
            } else {
                document.getElementById('waitingText').style.display = "block";
            }
        }

        function goToDayPhase() {
            db.ref('rooms/' + code).update({ gameState: 'day_discuss' });
        }

        function listenForPhaseChange() {
            db.ref('rooms/' + code + '/gameState').on('value', snap => {
                if(snap.val() === 'day_discuss') {
                    window.location.href = "oyun.html?join=" + code;
                }
            });
        }

        // Oyundan 脟谋x D眉ym蓹si (Birba艧a 枚ld眉r眉r)
        function exitGame() {
            if(confirm("Oyundan 莽谋xmaq ist蓹diyiniz蓹 蓹minsiniz? 脟谋xsan谋z 枚l眉 say谋lacaqs谋n谋z.")) {
                db.ref('rooms/' + code + '/deadPlayers/' + safeMe).set(true).then(() => {
                    window.location.href = "index.html";
                });
            }
        }
    </script>
</body>
</html>
