        // Massivi qarışdırmaq üçün funksiya (Fisher-Yates algorithm)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('join');
            const me = localStorage.getItem("mafia_nickname");

            if(!code || !me) {
                window.location.href = "index.html";
                return;
            }

            const safeMe = me.replace(/[.#$/\[\]]/g, "_");
            const roleRef = db.ref('rooms/' + code + '/assignedRoles/' + safeMe);

            // Host otaqdakı real adam sayına görə lazımi rolları çəkir və qarışdırıb paylayır
            db.ref('rooms/' + code).once('value', snapshot => {
                const room = snapshot.val();
                if (!room) return;

                if (room.host === me) {
                    db.ref('rooms/' + code + '/assignedRoles').once('value', rSnap => {
                        // Əgər rollar hələ paylanmayıbsa payla
                        if (!rSnap.exists()) {
                            const players = Object.keys(room.players);
                            const pCount = players.length;

                            // Sənəddə minimum 5, maksimum 30 nəfərlik hovuz var
                            let selectedPool = [];
                            if (pCount >= 5 && pCount <= 30) {
                                selectedPool = [...poolByCount[pCount]];
                            } else {
                                // Əgər nəsə səbəbdən 5-dən az olarsa default olaraq 5-lik hovuzdan götürsün
                                selectedPool = ["Sadə Mafiya", "Həkim", "Detektiv", "Bələdiyyə Sədri", "Fenomen"];
                            }

                            // Rolları qarışdırırıq
                            const shuffledRoles = shuffle(selectedPool);
                            
                            let updates = {};
                            players.forEach((pKey, index) => {
                                // Əgər oyunçu sayısı hovuzdan çoxdursa təhlükəsizlik üçün sivil verir
                                updates[pKey] = shuffledRoles[index] || "Sadə Mafiya";
                            });

                            db.ref('rooms/' + code + '/assignedRoles').set(updates);
                        }
                    });
                }
            });

            // Hər kəs öz xüsusi rolunu bazadan dinləyir
            roleRef.on('value', s => {
                const myRole = s.val();
                if (myRole) {
                    showRole(myRole);
                }
            });
        };

        function showRole(role) {
            const box = document.getElementById('roleBox');
            const nameTxt = document.getElementById('roleName');
            const noteTxt = document.getElementById('roleNote');

            nameTxt.innerText = role;
            
            // Əgər sənəddən köçürülən rola aid xüsusi not varsa bura yazılır
            if(roleNotes[role]) {
                noteTxt.innerText = roleNotes[role];
            } else {
                noteTxt.innerText = "Sistem tərəfindən təyin olunan gizli rol.";
            }

            // 1 saniyə sonra Fade-In (ekranda təmiz şriftdə görünmə)
            setTimeout(() => {
                box.classList.add('fade-in');
            }, 500);

            // 5 saniyə ekranda qalır, sonra Fade-Out ilə bağlanır
            setTimeout(() => {
                box.classList.remove('fade-in');
                box.classList.add('fade-out');
            }, 5500);

            // Animasiya tamamilə bitdikdən sonra növbəti mərhələyə keçid hissəsi
            setTimeout(() => {
                console.log("Rol nümayişi başa çatdı.");
                // Bura növbəti əsas oyun ekranının linkini bağlaya bilərsən
                // window.location.href = "game.html?join=" + code;
            }, 7000);
        }
