<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTAQ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow-x: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.3); }
        
        #codeTag { position: fixed; top: 10px; right: 10px; color: #4ade80; border: 1px solid #4ade80; padding: 10px; background: rgba(0,0,0,0.9); font-weight: bold; font-size: 1.2rem; z-index: 100; border-radius: 5px; }
        
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; z-index: 10; }
        h1 { font-size: 2.5rem; color: #ff0000; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,0,0,0.4); text-align: center; }
        .sub-title { font-size: 1rem; color: #aaa; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        
        .players-box { background: rgba(0,0,0,0.85); border: 2px solid #ff0000; width: 100%; max-width: 600px; border-radius: 8px; padding: 20px; box-shadow: 0 0 20px rgba(255,0,0,0.2); margin-bottom: 30px; }
        .box-title { font-size: 1.2rem; color: #ff0000; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; display: flex; justify-content: space-between; }
        
        .players-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .player-item { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px 15px; border-radius: 5px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        .player-item.is-me { border-color: #4ade80; background: rgba(74,222,128,0.05); color: #4ade80; }
        .host-badge { background: #ff0000; color: white; font-size: 0.75rem; padding: 2px 6px; font-weight: bold; border-radius: 3px; text-transform: uppercase; }
        
        .start-btn { background: #ff0000; color: white; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; box-shadow: 0 0 15px rgba(255,0,0,0.4); display: none; margin-bottom: 15px; }
        .start-btn:hover { background: #cc0000; box-shadow: 0 0 25px rgba(255,0,0,0.7); transform: scale(1.03); }
        .wait-msg { font-size: 1.2rem; color: #eab308; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite; text-align: center; display: none; margin-bottom: 15px; }
        
        /* ÇAT SİSTEMİ STILLƏRİ */
        #chatBtn { position: fixed; bottom: 20px; right: 20px; background: #000; border: 2px solid #ff0000; color: #ff0000; padding: 15px 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 5px; z-index: 1000; text-transform: uppercase; box-shadow: 0 0 10px rgba(255,0,0,0.3); transition: 0.3s; }
        #chatBtn:hover { background: #ff0000; color: #000; box-shadow: 0 0 20px rgba(255,0,0,0.6); }
        #chatNotif { display: none; color: #4ade80; margin-left: 5px; font-size: 1.2rem; }
        
        #chatPanel { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: rgba(0,0,0,0.95); border-left: 3px solid #ff0000; box-shadow: -10px 0 30px rgba(0,0,0,0.7); z-index: 2000; display: flex; flex-direction: column; transition: right 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); }
        #chatPanel.open { right: 0; }
        
        .chat-header { background: #111; border-bottom: 2px solid #ff0000; padding: 20px; font-size: 1.3rem; font-weight: bold; color: #ff0000; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; }
        .chat-close-btn { background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .chat-close-btn:hover { color: #ff0000; }
        
        #chatMessages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 10px; border-radius: 5px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg span { color: #4ade80; font-weight: bold; margin-right: 5px; }
        
        .chat-input-area { padding: 15px; background: #111; border-top: 1px solid #222; display: flex; gap: 10px; }
        #chatInput { flex: 1; background: #000; border: 1px solid #444; padding: 12px; color: white; font-size: 1rem; border-radius: 4px; outline: none; }
        #chatInput:focus { border-color: #ff0000; }
        .chat-send-btn { background: #ff0000; color: white; border: none; padding: 0 20px; font-weight: bold; font-size: 1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .chat-send-btn:hover { background: #cc0000; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="bg-container"><div class="bg"></div></div>
    <div id="codeTag">OTAQ KODU: <span id="roomCodeDisplay">------</span></div>

    <div class="lobby-container">
        <h1>Gözləmə Salonu</h1>
        <div class="sub-title" id="statusSub">Oyunçuların daxil olması gözlənilir</div>

        <div class="players-box">
            <div class="box-title">
                <span>Oyunçular</span>
                <span id="playerCountDisplay">(0/30)</span>
            </div>
            <div class="players-list" id="playersListContainer"></div>
        </div>

        <button class="start-btn" id="startGameBtn" onclick="executeStartGame()">OYUNU BAŞLAT</button>
        <div class="wait-msg" id="waitMessageEl">HOSTUN OYUNU BAŞLATMASI GÖZLƏNİLİR...</div>
    </div>

    <div id="chatBtn" onclick="toggleChat()">Çat <span id="chatNotif">●</span></div>
    
    <div id="chatPanel">
        <div class="chat-header">
            <span>Otaq Çatı</span>
            <button class="chat-close-btn" onclick="toggleChat()">✕</button>
        </div>
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesajınızı yazın...">
            <button class="chat-send-btn" onclick="sendMessage()">Göndər</button>
        </div>
    </div>

    <script>
        // Firebase Bağlantısı
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // URL parametrlərini və lokal yaddaşı oxuyuruq
        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) {
            window.location.href = "index.html";
        }

        document.getElementById('roomCodeDisplay').innerText = code;

        let isHost = false;
        let playersData = {};

        // Real-vaxt rejimində otaq datasını izləyirik
        db.ref('rooms/' + code).on('value', snapshot => {
            const room = snapshot.val();
            if(!room) {
                alert("Otaq tapılmadı və ya silinib!");
                window.location.href = "index.html";
                return;
            }

            // Oyun başlayıbsa, dərhal oyun sahəsinə yönləndirir
            if(room.gameState && room.gameState !== 'waiting') {
                window.location.href = "oyun.html?join=" + code;
                return;
            }

            playersData = room.players || {};
            isHost = (room.host === me);

            renderPlayers(room.host);
            toggleControlButtons();
        });

        // Çat mesajlarını dinləməyə başlayırıq
        listenToChat();

        // Oyunçuların siyahısını yeniləyən funksiya
        function renderPlayers(hostName) {
            const container = document.getElementById('playersListContainer');
            container.innerHTML = "";

            const keys = Object.keys(playersData);
            document.getElementById('playerCountDisplay').innerText = `(${keys.length}/30)`;

            keys.forEach(pKey => {
                const pName = playersData[pKey];
                const item = document.createElement('div');
                item.className = 'player-item';
                
                if(pName === me) item.classList.add('is-me');

                let badge = "";
                if(pName === hostName) {
                    badge = `<span class="host-badge">HOST</span>`;
                }

                item.innerHTML = `<span>${pName}</span> ${badge}`;
                container.appendChild(item);
            });
        }

        // Host və ya normal oyunçuya görə elementlərin idarə edilməsi
        function toggleControlButtons() {
            if(isHost) {
                document.getElementById('startGameBtn').style.display = 'block';
                document.getElementById('waitMessageEl').style.display = 'none';
                document.getElementById('statusSub').innerText = "Sən hostsan. Hamı yığılandan sonra oyunu başlada bilərsən.";
            } else {
                document.getElementById('startGameBtn').style.display = 'none';
                document.getElementById('waitMessageEl').style.display = 'block';
                document.getElementById('statusSub').innerText = "Oyunun başlaması üçün hostun təsdiqi gözlənilir.";
            }
        }

        // MƏCBURİ MAFİYA ZƏMANƏTLİ ROLLARI PAYLAMA VƏ OYUNU BAŞLATMA MEXANİZMİ
        function executeStartGame() {
            if(!isHost) return;

            const pKeys = Object.keys(playersData);
            const playerCount = pKeys.length;

            if(playerCount < 2) {
                alert("Oyunu başlatmaq üçün otaqda ən azı 2 nəfər oyunçu olmalıdır!");
                return;
            }

            let rolesPool = [];

            // Oyunçu sayına görə rolların tam siyahısı
            if (playerCount === 2) {
                rolesPool = ["Sadə Mafiya", "Dinc Sakin"];
            } else if (playerCount === 3) {
                rolesPool = ["Sadə Mafiya", "Dinc Sakin", "Həkim"];
            } else if (playerCount === 4) {
                rolesPool = ["Don", "Sadə Mafiya", "Dinc Sakin", "Həkim"];
            } else if (playerCount === 5) {
                rolesPool = ["Don", "Sadə Mafiya", "Dinc Sakin", "Həkim", "Detektiv"];
            } else {
                // 5 nəfərdən yuxarı olanda sənədindəki master siyahı tam tətbiq olunur
                const masterRolesList = [
                    "Don", "Sadə Mafiya", "Vəkil", "Aypara", "Xəfiyyə Mafiya", 
                    "Hiyləgər Mafiya", "Psixopat", "Zəhərləyici", "Canlı Bomba", 
                    "Oğru", "Həkim", "Detektiv", "Keşiş", "Cismani mühafizəçi", 
                    "Bələdiyyə Sədri", "Jurnalist", "Türmə rəisi", "Gözəlçə", 
                    "Eros", "Aşiqlər", "Fenomen", "Fedai", "Yaddaşsız", 
                    "Gizli Polis", "Qan Qardaşı", "Hakim", "Nəzarətçi"
                ];

                for (let i = 0; i < playerCount; i++) {
                    if (masterRolesList[i]) {
                        rolesPool.push(masterRolesList[i]);
                    } else {
                        rolesPool.push("Dinc Sakin");
                    }
                }
            }

            // --- MAFİYA ROLUNUN MUTLƏQ OLMASI NƏZARƏTİ ---
            const mafiaTeamRoles = ["Sadə Mafiya", "Don", "Vəkil", "Aypara", "Xəfiyyə Mafiya", "Hiyləgər Mafiya", "Gizli Mafiya"];
            let containsMafia = rolesPool.some(role => mafiaTeamRoles.includes(role));

            // Əgər hər hansı səbəbdən (məsələn, test mühitində fərqli saylarla girəndə) mafiya düşmürsə
            if (!containsMafia) {
                // Siyahının tam olaraq ən birinci rolunu məcburi surətdə Sadə Mafiya təyin edirik
                rolesPool[0] = "Sadə Mafiya";
            }
            // ----------------------------------------------------

            // Fisher-Yates Shuffle qarışdırma alqoritmi
            for (let i = rolesPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                let temp = rolesPool[i];
                rolesPool[i] = rolesPool[j];
                rolesPool[j] = temp;
            }

            // Rolları oyunçuların ID-lərinə bağlayırıq
            let finalAssignedRoles = {};
            pKeys.forEach((playerKey, index) => {
                finalAssignedRoles[playerKey] = rolesPool[index];
            });

            // Firebase üzərində otağı day_discuss (müzakirə) fazası ilə başladırıq
            db.ref('rooms/' + code).update({
                assignedRoles: finalAssignedRoles,
                gameState: 'day_discuss',
                phaseEndTime: Date.now() + (30 * 1000),
                votes: null,
                eliminationResult: null,
                winner: null,
                deadPlayers: null
            }).then(() => {
                window.location.href = "oyun.html?join=" + code;
            }).catch(err => {
                alert("Oyun başladılarkən verilənlər bazası xətası baş verdi: " + err.message);
            });
        }

        // ÇAT SİSTEMİ FUNKSİYALARI
        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('open');
            document.getElementById('chatNotif').style.display = 'none';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;
            
            db.ref('rooms/' + code + '/chat').push({
                sender: me,
                msg: txt,
                time: Date.now()
            });
            input.value = "";
        }

        document.getElementById('chatInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") { 
                event.preventDefault(); 
                sendMessage(); 
            }
        });

        function listenToChat() {
            db.ref('rooms/' + code + '/chat').on('child_added', snap => {
                const data = snap.val();
                const box = document.getElementById('chatMessages');
                box.innerHTML += `<div class="msg"><span>${data.sender}:</span> ${data.msg}</div>`;
                box.scrollTop = box.scrollHeight;
                
                const panel = document.getElementById('chatPanel');
                if(!panel.classList.contains('open') && data.sender !== me) {
                    document.getElementById('chatNotif').style.display = 'inline';
                }
            });
        }
    </script>
</body>
</html>
