<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTAQ YARAT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }
        .background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .background { width: 100%; height: 100%; background-image: url('babba.jpg'); background-size: cover; background-position: center; filter: brightness(0.7); }
        .overlay { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 30px; color: #ff0000; text-shadow: 2px 2px 5px #000; letter-spacing: 10px; }
        .main-btn { padding: 20px 60px; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: 3px solid #ff0000; background: none; color: #ff0000; transition: 0.4s; text-transform: uppercase; margin: 10px; }
        .main-btn:hover { background: #ff0000; color: white; }
    </style>
</head>
<body>
    <div class="background-container"><div class="background"></div></div>
    <div class="overlay">
        <h1>OTAQ AYARLARI</h1>
        <p style="font-size: 1.8rem; color: #fff; margin-bottom: 30px;">SESSİYA QURULUR...</p>
        <div style="display: flex;">
            <button class="main-btn" style="border-color: #4ade80; color: #4ade80;">BAŞLAT</button>
            <button class="main-btn" onclick="location.href='index.html'">GERİ</button>
        </div>
    </div>
</body>
</html>
