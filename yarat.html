<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTAQ | TDV-MAFIA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: #000; color: white; text-align: center; 
        }

        .background-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
        }

        .background { 
            width: 100%; height: 100%; 
            background-image: url('babba.jpg'); 
            background-size: cover; 
            background-position: center; 
            filter: brightness(0.4); 
        }

        #roomCodeDisplay { 
            position: absolute; top: 20px; right: 20px; 
            color: #4ade80; border: 2px solid #4ade80; 
            padding: 10px; font-size: 1.5rem; 
            background: rgba(0, 0, 0, 0.8); z-index: 100;
        }

        .setup-container { 
            margin-top: 150px; display: flex; flex-direction: column; align-items: center; 
        }

        .lobby-container { 
            margin-top: 120px; display: inline-block; width: 450px; 
            background: rgba(0, 0, 0, 0.8); padding: 25px; 
            border: 2px solid #ff0000; border-radius: 5px;
        }

        h1, h2 { color: #ff0000; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }

        .player-list { margin-top: 15px; text-align: left; }

        .player-item { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.5rem; padding: 12px; border-bottom: 1px solid #333; 
        }

        .host-tag { 
            color: #4ade80; font-size: 0.8rem; font-weight: bold;
            border: 1px solid #4ade80; padding: 3px 7px; text-transform: uppercase;
        }

        input[type="text"] { 
            padding: 15px; border: 2px solid #ff0000; 
            background: rgba(0, 0, 0, 0.6); color: white; 
            width: 350px; text-align: center; font-size: 1.2rem; margin-bottom: 20px;
        }

        .main-btn { 
            padding: 15px 40px; font-size: 1.3rem; font-weight: bold; 
            border: 3px solid #ff0000; background: none; color: #ff0000; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }

        .main-btn:hover { background: #ff0000; color: white; }

        label { font-size: 1.2rem; margin-bottom: 10px; display: block; }
        
        input[type="range"] { width: 300px; accent-color: #ff0000; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="background"></div>
    </div>

    <div id="roomCodeDisplay" style="display:none;"></div>

    <div id="setupSection" class="setup-container">
        <h1>OTAQ AYARLARI</h1>
        <input type="text" id="roomNameInput" placeholder="OTAQ ADI DAXİL EDİN...">
        
        <div>
            <label>OYUNÇU LİMİTİ: <span id="limitLabel" style="color:red; font-weight:bold;">5</span></label>
            <input type="range" id="playerLimitRange" min="2" max="30" value="5" 
                   oninput="document.getElementById('limitLabel').innerText=this.value">
        </div>

        <button class="main-btn" onclick="createNewRoom()">BAŞLAT</button>
    </div>

    <div id="lobbySection" class="lobby-container" style="display:none;">
        <h2 id="roomTitleDisplay"></h2>
        <div class="player-list">
            <h3 style="color: #666; font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid #ff0000;">QOŞULAN AGENTLƏR:</h3>
            <div id="playerContainer"></div>
        </div>
        <button class="main-btn" style="margin-top: 30px;" onclick="location.href='index.html'">OTAQDAN ÇIX</button>
    </div>

    <script>
        // Firebase Konfiqurasiyası
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Təsadüfi otaq kodu yaratmaq
        function generateRoomCode() {
            return "U" + Math.floor(100000 + Math.random() * 899999);
        }

        // Yeni otaq yaratmaq funksiyası
        function createNewRoom() {
            const name = document.getElementById("roomNameInput").value.trim();
            if (!name) {
                alert("Zəhmət olmasa otaq adı yazın!");
                return;
            }

            const limit = document.getElementById("playerLimitRange").value;
            const code = generateRoomCode();
            const hostName = localStorage.getItem("mafia_nickname") || "Admin";

            // Firebase-ə otaq məlumatlarını göndəririk
            database.ref('rooms/' + code).set({
                roomName: name,
                maxPlayers: parseInt(limit),
                host: hostName,
                players: {
                    [hostName.replace(/\./g, '_')]: hostName // Firebase key-də nöqtə ola bilməz
                }
            }).then(() => {
                // Yaradıldıqdan sonra həmin otağın linkinə keçid edirik
                window.location.href = "yarat.html?join=" + code;
            }).catch((err) => {
                alert("Xəta baş verdi: " + err.message);
            });
        }

        // Otaq məlumatlarını oxumaq və göstərmək
        function initLobby() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('join');

            if (!code) return; // Əgər URL-də kod yoxdursa, heç nə etmə

            const myName = localStorage.getItem("mafia_nickname") || "Qonaq_" + Math.floor(Math.random()*100);

            // 1. Otağa öz adımızı əlavə edirik
            database.ref('rooms/' + code + '/players/' + myName.replace(/\./g, '_')).set(myName);

            // 2. Otağı "canlı" izləyirik (Biri qoşulanda avtomatik yenilənir)
            database.ref('rooms/' + code).on('value', (snapshot) => {
                const room = snapshot.val();
                
                if (!room) {
                    alert("Bu otaq artıq mövcud deyil!");
                    window.location.href = "index.html";
                    return;
                }

                // UI-ni dəyişdiririk (Setup gizlənir, Lobby görünür)
                document.getElementById("setupSection").style.display = "none";
                document.getElementById("lobbySection").style.display = "inline-block";
                document.getElementById("roomCodeDisplay").innerText = "KOD: " + code;
                document.getElementById("roomCodeDisplay").style.display = "block";
                document.getElementById("roomTitleDisplay").innerText = room.roomName;

                // Oyunçu siyahısını təmizləyib yenidən yazırıq
                const container = document.getElementById("playerContainer");
                container.innerHTML = "";

                const playerKeys = Object.keys(room.players);
                playerKeys.forEach((key) => {
                    const playerName = room.players[key];
                    const isHost = (playerName === room.host);

                    const div = document.createElement("div");
                    div.className = "player-item";
                    div.innerHTML = `
                        <span>${playerName}</span>
                        ${isHost ? '<span class="host-tag">HOST</span>' : ''}
                    `;
                    container.appendChild(div);
                });
            });
        }

        // Səhifə yüklənəndə funksiyanı çağır
        window.onload = initLobby;
    </script>

</body>
</html>
