<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTAQ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background-color: #000; color: white; text-align: center; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('babba.jpg') center/cover; filter: brightness(0.4); }
        #rCode { position: absolute; top: 20px; right: 20px; color: #4ade80; border: 2px solid #4ade80; padding: 10px; font-size: 1.5rem; background: rgba(0,0,0,0.8); }
        .box { margin-top: 150px; display: inline-block; width: 400px; background: rgba(0,0,0,0.7); padding: 20px; border: 1px solid red; }
        .p-item { display: flex; justify-content: space-between; font-size: 1.4rem; padding: 10px; border-bottom: 1px solid #333; }
        .host { color: #4ade80; font-size: 0.8rem; border: 1px solid #4ade80; padding: 2px 5px; }
        .btn { padding: 15px 30px; border: 2px solid red; background: none; color: red; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        input[type="text"] { padding: 12px; border: 2px solid red; background: #000; color: #fff; text-align: center; width: 250px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="rCode" style="display:none;"></div>

    <div id="setup" style="margin-top: 150px;">
        <h1 style="color:red; margin-bottom:20px;">OTAQ QUR</h1>
        <input type="text" id="rName" placeholder="OTAQ ADI..."><br><br>
        <label>OYUNÇU SAYI: <span id="num">5</span></label><br>
        <input type="range" id="limit" min="2" max="30" value="5" oninput="document.getElementById('num').innerText=this.value" style="width:250px; accent-color:red;"><br>
        <button class="btn" onclick="create()">BAŞLAT</button>
    </div>

    <div id="lobby" class="box" style="display:none;">
        <h2 id="title" style="color:red; border-bottom:1px solid red; margin-bottom:10px; text-transform:uppercase;"></h2>
        <div id="pList"></div>
        <button class="btn" onclick="location.href='index.html'">ÇIXIŞ</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function create() {
            const n = document.getElementById("rName").value.trim();
            if(!n) return;
            const l = document.getElementById("limit").value;
            const c = "U" + Math.floor(100000 + Math.random() * 899999);
            const me = localStorage.getItem("mafia_nickname") || "Oyunçu";

            db.ref('rooms/' + c).set({
                name: n,
                max: parseInt(l),
                host: me,
                players: { [me]: true }
            }).then(() => {
                location.href = "yarat.html?join=" + c;
            });
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('join');
            if(!code) return;

            const me = localStorage.getItem("mafia_nickname") || "Qonaq";
            
            // Otağa qoşul və məlumatları canlı izlə
            db.ref('rooms/' + code + '/players/' + me).set(true);

            db.ref('rooms/' + code).on('value', (snap) => {
                const room = snap.val();
                if(!room) return;

                document.getElementById("setup").style.display = "none";
                document.getElementById("lobby").style.display = "block";
                document.getElementById("rCode").innerText = "KOD: " + code;
                document.getElementById("rCode").style.display = "block";
                document.getElementById("title").innerText = room.name;

                const list = document.getElementById("pList");
                list.innerHTML = "";
                Object.keys(room.players).forEach(p => {
                    list.innerHTML += `<div class="p-item"><span>${p}</span> ${p === room.host ? '<span class="host">HOST</span>' : ''}</div>`;
                });
            });
        };
    </script>
</body>
</html>
