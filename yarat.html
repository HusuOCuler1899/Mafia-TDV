<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA | Otaq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }
        .background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .background { width: 150%; height: 150%; background-image: url('babba.jpg'); background-size: cover; background-position: center; filter: brightness(0.6); }
        .overlay { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; position: relative; }
        #roomNameDisplay { position: absolute; top: 30px; font-size: 2.5rem; color: #ff0000; text-transform: uppercase; letter-spacing: 5px; font-weight: bold; }
        #roomCodeDisplay { position: absolute; top: 20px; right: 30px; font-size: 1.8rem; color: #4ade80; background: rgba(0, 0, 0, 0.6); padding: 10px; border: 1px solid #4ade80; display: none; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; color: #ff0000; text-shadow: 2px 2px 5px #000; letter-spacing: 10px; }
        .form-container { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 1.2rem; color: #fff; text-transform: uppercase; font-weight: bold; }
        input[type="text"] { padding: 15px; border: 2px solid #ff0000; background: rgba(0,0,0,0.4); color: white; outline: none; width: 350px; font-size: 1.2rem; text-align: center; }
        .range-container { width: 350px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff0000; }
        #playerCountValue { font-size: 2rem; color: #ff0000; font-weight: bold; }
        .action-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .main-btn { padding: 15px 40px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border: 3px solid #ff0000; background: none; color: #ff0000; transition: 0.4s; text-transform: uppercase; }
        .main-btn:hover { background: #ff0000; color: white; }
        .start-btn { border-color: #4ade80; color: #4ade80; }
        .start-btn:hover { background: #4ade80; color: black; }
        .player-list-container { width: 450px; margin-top: 20px; text-align: left; border-top: 1px solid rgba(255, 0, 0, 0.4); padding-top: 20px; }
        .player-item { font-size: 1.5rem; margin-bottom: 12px; padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .host-tag { color: #4ade80; font-weight: bold; font-size: 0.9rem; border: 1px solid #4ade80; padding: 3px 10px; }
    </style>
</head>
<body>
    <div class="background-container"><div class="background"></div></div>
    <div class="overlay">
        <div id="roomNameDisplay"></div>
        <div id="roomCodeDisplay"></div>

        <div id="setupArea">
            <h1>OTAQ QURULUR</h1>
            <div class="form-container">
                <div class="input-group">
                    <label>Otağın Adı</label>
                    <input type="text" id="roomNameInp" placeholder="OTAQ ADI YAZIN...">
                </div>
                <div class="input-group range-container">
                    <label>Oyunçu Limiti: <span id="playerCountValue">5</span></label>
                    <input type="range" id="playerRange" min="5" max="30" value="5" oninput="updateCount(this.value)">
                </div>
                <div class="action-buttons">
                    <button class="main-btn start-btn" onclick="createRoom()">ODA YARAT</button>
                    <button class="main-btn" onclick="location.href='index.html'">GERİ</button>
                </div>
            </div>
        </div>
        
        <div id="roomReadyArea" style="display: none;">
            <p id="waitMsg" style="font-size: 1.2rem; color: #aaa; margin-bottom: 20px;">OYUNÇULAR GÖZLƏNİLİR...</p>
            <div class="player-list-container">
                <h3 style="color: #ff0000; margin-bottom: 15px;">OYUNÇU SİYAHISI:</h3>
                <div id="playerList"></div>
            </div>
            <div class="action-buttons">
                <button class="main-btn start-btn" id="startGameBtn" style="display: none;">BAŞLAT</button>
                <button class="main-btn" onclick="location.href='index.html'">ÇIXIŞ</button>
            </div>
        </div>
    </div>

    <script>
        function updateCount(val) { document.getElementById("playerCountValue").innerText = val; }
        
        function generateRoomCode() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            return chars.charAt(Math.floor(Math.random()*chars.length)) + Math.floor(100000 + Math.random()*900000);
        }

        function createRoom() {
            const name = document.getElementById("roomNameInp").value.trim();
            const max = document.getElementById("playerRange").value;
            if(name === "") { alert("Ad yazın!"); return; }

            const code = generateRoomCode();
            const myName = localStorage.getItem("mafia_nickname") || "Admin";
            
            const roomInfo = { name: name, maxPlayers: max, players: [myName] };
            localStorage.setItem("active_room_" + code, JSON.stringify(roomInfo));

            showRoomUI(name, code, roomInfo.players);
        }

        function showRoomUI(name, code, players) {
            document.getElementById("roomNameDisplay").innerText = name;
            document.getElementById("roomCodeDisplay").innerText = "KOD: " + code;
            document.getElementById("roomCodeDisplay").style.display = "block";
            document.getElementById("setupArea").style.display = "none";
            document.getElementById("roomReadyArea").style.display = "block";
            renderPlayers(players);
        }

        function renderPlayers(players) {
            const listDiv = document.getElementById("playerList");
            listDiv.innerHTML = "";
            players.forEach((p, index) => {
                listDiv.innerHTML += `<div class="player-item"><span>${p}</span>${index===0?'<span class="host-tag">HOST</span>':''}</div>`;
            });
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const joinCode = urlParams.get('join');
            if(joinCode) {
                const roomData = JSON.parse(localStorage.getItem("active_room_" + joinCode));
                if(roomData) {
                    const myName = localStorage.getItem("mafia_nickname") || "Qonaq";
                    if(!roomData.players.includes(myName)) {
                        roomData.players.push(myName);
                        localStorage.setItem("active_room_" + joinCode, JSON.stringify(roomData));
                    }
                    showRoomUI(roomData.name, joinCode, roomData.players);
                }
            }
        }
    </script>
</body>
</html>
