<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTAQ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow-x: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.3); }
        
        #codeTag { position: fixed; top: 10px; right: 10px; color: #4ade80; border: 1px solid #4ade80; padding: 10px; font-size: 1.1rem; background: rgba(0,0,0,0.9); z-index: 100; font-weight: bold; }
        
        .container { margin: 80px auto 20px; width: 92%; max-width: 480px; background: rgba(0,0,0,0.85); padding: 25px; border: 2px solid #ff0000; min-height: 350px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        
        h1, h2 { color: #ff0000; text-transform: uppercase; font-size: 1.6rem; margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
        
        .p-list { text-align: left; margin-top: 20px; max-height: 45vh; overflow-y: auto; }
        .p-item { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; padding: 12px; border-bottom: 1px solid #333; }
        .host-tag { color: #4ade80; font-size: 0.75rem; border: 1px solid #4ade80; padding: 3px 6px; font-weight: bold; }
        
        input[type="text"] { padding: 15px; border: 2px solid #ff0000; background: #000; color: white; width: 100%; text-align: center; margin-bottom: 20px; outline: none; font-size: 1rem; }
        
        .btn { padding: 15px; font-size: 1.1rem; font-weight: bold; border: 2px solid #ff0000; background: none; color: #ff0000; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #ff0000; color: white; }
        
        input[type="range"] { width: 100%; accent-color: #ff0000; margin: 20px 0; height: 10px; }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg"></div></div>
    <div id="codeTag" style="display:none;"></div>

    <div id="setupArea" class="container">
        <h1>OTAQ AYARLARI</h1>
        <input type="text" id="roomNameInp" placeholder="OTAQ ADI YAZIN">
        <div style="margin-bottom: 15px;">
            <label style="font-size:1.1rem;">OYUNÇU LİMİTİ: <span id="limitVal" style="color:red; font-weight:bold;">5</span></label>
            <input type="range" id="limitRange" min="5" max="30" value="5">
        </div>
        <button type="button" class="btn" id="startBtn">OTAĞI AÇ</button>
        <button type="button" class="btn" style="border-color:#555; color:#555;" onclick="location.href='index.html'">LƏĞV ET</button>
    </div>

    <div id="lobbyArea" class="container" style="display:none;">
        <h2 id="roomTitle"></h2>
        <div class="p-list" id="playersDiv"></div>
        <button type="button" class="btn" id="exitBtn">OTAQDAN ÇIX</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        document.getElementById("limitRange").oninput = function() { 
            document.getElementById("limitVal").innerText = this.value; 
        };

        // OTAQ YARATMA
        document.getElementById("startBtn").onclick = function() {
            const name = document.getElementById("roomNameInp").value.trim();
            if(!name) { alert("Otaq adı mütləqdir!"); return; }
            
            const limit = document.getElementById("limitRange").value;
            const code = "U" + Math.floor(100000 + Math.random() * 899999);
            const user = localStorage.getItem("mafia_nickname") || "Anonim";
            const safeUser = user.replace(/[.#$/\[\]]/g, "_");

            const data = { 
                roomName: name, 
                maxPlayers: parseInt(limit), 
                host: user, 
                players: {} 
            };
            data.players[safeUser] = user;

            db.ref('rooms/' + code).set(data).then(() => {
                location.href = "yarat.html?join=" + code;
            });
        };

        // ÇIXIŞ VƏ HOST TRANSFERİ
        document.getElementById("exitBtn").onclick = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('join');
            const me = localStorage.getItem("mafia_nickname");
            
            if(code && me) {
                const safeMe = me.replace(/[.#$/\[\]]/g, "_");
                const ref = db.ref('rooms/' + code);
                
                ref.once('value').then(s => {
                    const room = s.val();
                    if(!room) return;

                    // Oyunçunu sil
                    ref.child('players/' + safeMe).remove().then(() => {
                        // Əgər çıxan host idisə
                        if(room.host === me) {
                            const pKeys = room.players ? Object.keys(room.players).filter(k => k !== safeMe) : [];
                            if(pKeys.length > 0) {
                                // Siyahıda qalan ilk adamı yeni host et
                                ref.update({ host: room.players[pKeys[0]] });
                            } else {
                                // Otaqda kimsə qalmayıbsa otağı sil
                                ref.remove();
                            }
                        }
                    }).then(() => location.href = 'index.html');
                });
            } else {
                location.href = 'index.html';
            }
        };

        window.onload = function() {
            const code = new URLSearchParams(window.location.search).get('join');
            if(!code) return;
            
            const me = localStorage.getItem("mafia_nickname") || "Agent";
            const safeMe = me.replace(/[.#$/\[\]]/g, "_");
            
            // Otağa daxil olarkən adını əlavə et
            db.ref('rooms/' + code + '/players/' + safeMe).set(me);

            // Canlı izləmə
            db.ref('rooms/' + code).on('value', s => {
                const room = s.val();
                if(!room) { 
                    alert("Otaq mövcud deyil!"); 
                    location.href = "index.html"; 
                    return; 
                }

                document.getElementById("setupArea").style.display = "none";
                document.getElementById("lobbyArea").style.display = "block";
                document.getElementById("codeTag").innerText = "KOD: " + code;
                document.getElementById("codeTag").style.display = "block";
                document.getElementById("roomTitle").innerText = room.roomName;

                const pDiv = document.getElementById("playersDiv");
                pDiv.innerHTML = "";
                
                // Oyunçuları listələ
                Object.values(room.players || {}).forEach(p => {
                    const isHost = (p === room.host);
                    pDiv.innerHTML += `
                        <div class="p-item">
                            <span>${p}</span>
                            ${isHost ? '<span class="host-tag">HOST</span>' : ''}
                        </div>`;
                });
            });
        };
    </script>
</body>
</html>
