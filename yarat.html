<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV-MAFIA | Otaq Yarat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body, html { height: 100%; overflow: hidden; background-color: #000; }

        /* Arxa plan şəkli - 150% ölçü və mərkəzləmə */
        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .background {
            width: 150%; height: 150%;
            background-image: url('babba.jpg'); 
            background-size: cover; background-position: center; 
            filter: brightness(0.6); 
        }

        .overlay {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
            position: relative;
        }

        /* Otaq adı yuxarı ortada olacaq */
        #roomNameDisplay {
            position: absolute;
            top: 30px;
            font-size: 2.5rem;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 10px #000;
            font-weight: bold;
        }

        /* Otaq kodu sağ küncdə (U123456 formatı) */
        #roomCodeDisplay {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.8rem;
            color: #4ade80;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border: 1px solid #4ade80;
            display: none; /* Yaradılana qədər gizli */
        }

        h1 { font-size: 3.5rem; margin-bottom: 20px; color: #ff0000; text-shadow: 2px 2px 5px #000; letter-spacing: 10px; }

        .form-container {
            background: none;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-size: 1.2rem; color: #fff; text-transform: uppercase; font-weight: bold; }

        input[type="text"] {
            padding: 15px; border: 2px solid #ff0000; background: rgba(0,0,0,0.4);
            color: white; outline: none; width: 350px; font-size: 1.2rem; text-align: center;
        }

        /* Scroll (Oyunçu sayı seçimi) üçün stil */
        .range-container { width: 350px; }
        
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff0000;
        }

        #playerCountValue { font-size: 2rem; color: #ff0000; font-weight: bold; }

        .action-buttons { display: flex; gap: 20px; margin-top: 30px; }

        .main-btn {
            padding: 20px 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            border: 3px solid #ff0000; background: none; color: #ff0000; transition: 0.4s; text-transform: uppercase;
        }

        .main-btn:hover { background: #ff0000; color: white; box-shadow: 0 0 15px #ff0000; }

        .start-btn { border-color: #4ade80; color: #4ade80; }
        .start-btn:hover { background: #4ade80; color: black; box-shadow: 0 0 15px #4ade80; }
    </style>
</head>
<body>

    <div class="background-container"><div class="background"></div></div>

    <div class="overlay">
        <div id="roomNameDisplay"></div>
        <div id="roomCodeDisplay"></div>

        <div id="setupArea">
            <h1>OTAQ QURULUR</h1>
            
            <div class="form-container">
                <div class="input-group">
                    <label>Otağın Adı</label>
                    <input type="text" id="roomNameInp" placeholder="MƏS: ÖLÜM QOVŞAĞI">
                </div>

                <div class="input-group range-container">
                    <label>Oyunçu Sayı: <span id="playerCountValue">5</span></label>
                    <input type="range" id="playerRange" min="5" max="30" value="5" oninput="updateCount(this.value)">
                </div>

                <div class="action-buttons">
                    <button class="main-btn start-btn" onclick="createRoom()">ODA YARAT</button>
                    <button class="main-btn" onclick="location.href='index.html'">GERİ</button>
                </div>
            </div>
        </div>
        
        <div id="roomReadyArea" style="display: none;">
            <p style="font-size: 1.5rem;">Otaq aktivdir. Digər oyunçuların qoşulmasını gözləyin...</p>
            <button class="main-btn" style="margin-top: 30px;" onclick="location.reload()">OTAQDAN ÇIX</button>
        </div>
    </div>

    <script>
        // Scroll rəqəmini canlı yeniləyir
        function updateCount(val) {
            document.getElementById("playerCountValue").innerText = val;
        }

        // Random Kod Yaradan Funksiya (1 hərf + 6 rəqəm)
        function generateRoomCode() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const randomChar = chars.charAt(Math.floor(Math.random() * chars.length));
            const randomNums = Math.floor(100000 + Math.random() * 900000); // 6 rəqəmli
            return randomChar + randomNums;
        }

        function createRoom() {
            const name = document.getElementById("roomNameInp").value.trim();
            if(name === "") {
                alert("Zəhmət olmasa otaq adı yazın!");
                return;
            }

            // Otaq adını yuxarıya yazır
            document.getElementById("roomNameDisplay").innerText = name;
            
            // Random kod yaradır və sağ küncə qoyur
            const code = generateRoomCode();
            const codeBox = document.getElementById("roomCodeDisplay");
            codeBox.innerText = "KOD: " + code;
            codeBox.style.display = "block";

            // Ayarlar panelini gizlədir, otaq mesajını göstərir
            document.getElementById("setupArea").style.display = "none";
            document.getElementById("roomReadyArea").style.display = "block";
            
            console.log("Otaq Yaradıldı: " + name + " | Kod: " + code);
        }
    </script>
</body>
</html>
