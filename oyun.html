<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GÜNDÜZ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        /* Sənin Orijinal Dizaynın (Toxunulmayıb) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); }

        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,0,0,0.1); border-bottom: 2px solid #ff0000; height: 60px; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #ff0000; text-transform: uppercase; letter-spacing: 2px; }
        .timer-box { font-size: 1.8rem; font-weight: bold; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .chat-toggle-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .role-view-btn { background: #eab308; color: black; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        .main-area { display: flex; flex-direction: column; align-items: center; height: calc(100% - 60px); padding: 10px; position: relative; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 80vh; }
        
        .player-card { background: rgba(0,0,0,0.7); border: 2px solid #444; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; cursor: pointer; position: relative; transition: 0.2s; text-align: center; }
        .player-card.active-vote:hover { border-color: #ff0000; background: rgba(255,0,0,0.2); }
        .player-card.dead { filter: grayscale(100%) opacity(0.5); pointer-events: none; border-color: #222 !important; }
        .player-card.voted-for { border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }

        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        .vote-dots { display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; margin-top: 5px; min-height: 12px; width: 100%; }
        .vote-dot { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 5px #000; }
        
        .skip-btn { margin-top: 10px; background: #555; color: white; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border: 2px solid #888; border-radius: 5px; cursor: pointer; display: none; }
        .skip-btn:hover { background: #777; }
        
        #chatPanel { position: fixed; top: 60px; right: -350px; width: 300px; height: calc(100% - 60px); background: rgba(0,0,0,0.95); border-left: 2px solid #ff0000; transition: right 0.3s ease; display: flex; flex-direction: column; z-index: 1000; }
        #chatPanel.open { right: 0; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { font-size: 0.9rem; word-break: break-word; }
        .msg span { font-weight: bold; color: #ff0000; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        .chat-input-area input { flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; outline: none; }
        .chat-input-area button { background: #ff0000; color: white; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #111; border: 2px solid #ff0000; padding: 30px; text-align: center; border-radius: 10px; max-width: 400px; width: 90%; }
        .modal-title { font-size: 1.5rem; color: white; margin-bottom: 20px; }
        .modal-btns { display: flex; justify-content: center; gap: 15px; }
        .modal-btns button { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-yes { background: #ff0000; color: white; }
        .btn-no { background: #555; color: white; }
        
        #roleModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2500; }
        .role-box { background: #1a1a1a; border: 3px solid #eab308; padding: 40px; text-align: center; border-radius: 12px; max-width: 450px; width: 85%; box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
        .role-text-title { font-size: 1.2rem; color: #aaa; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .role-text-value { font-size: 2.2rem; color: #eab308; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(234, 179, 8, 0.4); margin-bottom: 25px; }
        .role-close-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        #resultOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; padding: 20px; }
        #resultMainText { font-size: clamp(2rem, 6vw, 5.5rem); color: #ff0000; font-weight: 900; letter-spacing: 3px; margin-bottom: 25px; text-shadow: 0 0 40px rgba(255, 0, 0, 1); text-transform: uppercase; line-height: 1.5; }
        #resultNote { font-size: 1.5rem; color: #baa7a7; max-width: 800px; margin-top: 20px; font-weight: bold; line-height: 1.4; }
        
        #voiceChatPanel { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); border: 2px solid #00aaff; padding: 15px; border-radius: 10px; z-index: 1500; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .vc-btn { padding: 8px 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <script>
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { history.pushState(null, null, window.location.href); });
    </script>

    <div class="bg-container"><div class="bg"></div></div>

    <header id="mainHeader">
        <button class="role-view-btn" onclick="showMyRole()">ROLU ÖYRƏN</button>
        <div class="phase-title" id="phaseText">SÖHBƏT VAXTI</div>
        <div class="timer-box" id="timerDisplay">30</div>
        <button class="chat-toggle-btn" onclick="toggleChat()">Çat <span id="chatNotif" style="display:none;color:#ffeb3b;">(!)</span></button>
    </header>

    <div class="main-area" id="mainAreaContainer">
        <div class="grid-container" id="playerGrid"></div>
        <button class="skip-btn" id="skipBtn">SƏSİ BOŞA VER (SKIP) <span id="skipVoteCount">(0)</span></button>
    </div>

    <div id="chatPanel">
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yaz..." autocomplete="off">
            <button onclick="sendMessage()">GÖNDƏR</button>
        </div>
    </div>

    <div class="modal-overlay" id="voteModal">
        <div class="modal-box">
            <div class="modal-title" id="voteModalTitle">Əminsən?</div>
            <div class="modal-btns">
                <button class="btn-yes" id="confirmVoteBtn">BƏLİ, ASILSIN!</button>
                <button class="btn-no" onclick="closeModal()">LƏĞV ET</button>
            </div>
        </div>
    </div>

    <div id="roleModal">
        <div class="role-box">
            <div class="role-text-title">Sənin Əsl Rolun</div>
            <div class="role-text-value" id="myRoleValue">YÜKLƏNİR...</div>
            <button class="role-close-btn" onclick="hideMyRole()">PƏNCƏRƏNİ BAĞLA</button>
        </div>
    </div>

    <div id="resultOverlay">
        <div id="resultMainText"></div>
        <div id="resultNote"></div>
    </div>

    <div id="voiceChatPanel">
        <h4 style="color:#00aaff; margin:0; font-size:1.1rem; letter-spacing:1px;">SƏSLİ ÇAT</h4>
        <div id="vc-status" style="font-size:0.8rem; color:#aaa;">Qoşulmayıb</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="btn-join-vc" class="vc-btn" onclick="joinVoiceChat()" style="background:#00aaff; color:white;">QOŞUL</button>
            <button id="btn-mute-vc" class="vc-btn" onclick="toggleMute()" style="background:#ff4d4d; color:white; display:none;">SƏSİ BAĞLA</button>
            <button id="btn-leave-vc" class="vc-btn" onclick="toggleMute()" style="background:#555; color:white; display:none;">ÇIX</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;
        
        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let currentPhase = "";
        let playersData = {};
        let deadPlayers = {};
        let rolesData = {};
        let myVote = null;
        let selectedTarget = null;
        let timerInterval = null;
        let currentVotes = {};
        let latestEliminationResult = null;
        let latestWinner = null;

        db.ref('rooms/' + code).once('value', snapshot => {
            const room = snapshot.val();
            if(!room) { window.location.href = "index.html"; return; }

            isHost = (room.host === me);
            playersData = room.players || {};
            rolesData = room.assignedRoles || {};
            deadPlayers = room.deadPlayers || {};

            if(isHost && room.gameState !== 'day_discuss') {
                db.ref('rooms/' + code + '/votes').remove();
                db.ref('rooms/' + code + '/eliminationResult').remove();
                setPhase('day_discuss', 30);
            }
            
            listenToRoomUpdates();
            listenToVotes();
            listenToChat();
            listenToElimination();
            listenToMyVoteLock();
        });

        function listenToMyVoteLock() {
            db.ref('rooms/' + code + '/votes/' + safeMe).on('value', snap => {
                myVote = snap.val();
                if (myVote) {
                    document.getElementById('skipBtn').style.display = 'none';
                } else if (currentPhase === 'day_vote' && !deadPlayers[safeMe]) {
                    document.getElementById('skipBtn').style.display = 'block';
                }
                buildGrid();
            });
        }

        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;

                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                rolesData = room.assignedRoles || {};
                
                if(room.gameState !== currentPhase) {
                    currentPhase = room.gameState;
                    handlePhaseChange(room);
                }
                buildGrid();
            });
        }

        function showMyRole() {
            document.getElementById('myRoleValue').innerText = rolesData[safeMe] || "Dinc Sakin";
            document.getElementById('roleModal').style.display = "flex";
        }
        function hideMyRole() {
            document.getElementById('roleModal').style.display = "none";
        }

        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);

            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';

                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];
                    card.id = "card_" + sName;

                    if(deadPlayers[sName]) card.classList.add('dead');
                    if(myVote && myVote === sName) card.classList.add('voted-for');
                    
                    card.innerHTML = `
                        <div class="p-name" id="nameText_${sName}">${pName}</div>
                        <div class="vote-dots" id="dots_${sName}"></div>
                    `;
                    
                    if(currentPhase === 'day_vote' && !deadPlayers[sName] && !deadPlayers[safeMe] && !myVote) {
                        card.classList.add('active-vote');
                    }
                    
                    card.onclick = () => {
                        if(currentPhase === 'day_vote' && !deadPlayers[sName] && !deadPlayers[safeMe] && !myVote) {
                            openModal(sName, pName);
                        }
                    };
                } else {
                    card.style.visibility = "hidden";
                }
                grid.appendChild(card);
            }
            updateVotesUI();
        }

        function handlePhaseChange(room) {
            clearInterval(timerInterval);
            const endTime = room.phaseEndTime || 0;

            if(currentPhase === 'day_discuss') {
                document.getElementById('phaseText').innerText = "SÖHBƏT VAXTI";
                document.getElementById('skipBtn').style.display = 'none';
                document.getElementById('resultOverlay').style.display = 'none';
                document.getElementById('mainHeader').style.display = 'flex';
                document.getElementById('mainAreaContainer').style.display = 'flex';
                document.getElementById('voiceChatPanel').style.display = 'flex';
            }
            else if(currentPhase === 'day_vote') {
                document.getElementById('phaseText').innerText = "OYLAMA BAŞLADI!";
                if(!deadPlayers[safeMe] && !myVote) {
                    document.getElementById('skipBtn').style.display = 'block';
                }
            }
            else if(currentPhase === 'day_reveal') {
                document.getElementById('phaseText').innerText = "SƏSLƏR AÇILDI!";
                document.getElementById('skipBtn').style.display = 'none';
                closeModal();
            }
            else if(currentPhase === 'day_elimination') {
                document.getElementById('phaseText').innerText = "ASILMA ANI";
                document.getElementById('skipBtn').style.display = 'none';
                renderEliminationUI();
            }
            else if(currentPhase === 'game_over') {
                renderGameOverUI();
            }

            timerInterval = setInterval(() => {
                let timeLeft = Math.ceil((endTime - Date.now()) / 1000);
                if(timeLeft < 0) timeLeft = 0;
                document.getElementById('timerDisplay').innerText = timeLeft;

                if(timeLeft <= 0 && isHost) {
                    clearInterval(timerInterval);
                    if(currentPhase === 'day_discuss') {
                        setPhase('day_vote', 45);
                    } else if(currentPhase === 'day_vote') {
                        db.ref('rooms/' + code + '/votes').once('value', snap => {
                            let cv = snap.val() || {};
                            let updates = {};
                            Object.keys(playersData).forEach(pKey => {
                                if(!deadPlayers[pKey] && !cv[pKey]) {
                                    updates['rooms/' + code + '/votes/' + pKey] = "SKIP";
                                }
                            });
                            if(Object.keys(updates).length > 0) db.ref().update(updates);
                            setPhase('day_reveal', 10);
                        });
                    } else if(currentPhase === 'day_reveal') {
                        processElimination();
                    } else if(currentPhase === 'day_elimination') {
                        db.ref('rooms/' + code + '/gameState').set('night_phase');
                        window.location.href = `gece.html?join=${code}`;
                    }
                }

                if(timeLeft <= 0 && !isHost) {
                    if(currentPhase === 'day_elimination') {
                        clearInterval(timerInterval);
                        window.location.href = `gece.html?join=${code}`;
                    }
                }
            }, 1000);
        }

        function setPhase(phaseName, seconds) {
            db.ref('rooms/' + code).update({
                gameState: phaseName,
                phaseEndTime: Date.now() + (seconds * 1000)
            });
        }

        function openModal(targetSafeName, targetName) {
            selectedTarget = targetSafeName;
            document.getElementById('voteModalTitle').innerText = `Əminsən ki, ${targetName} üçün səs verəsən?`;
            document.getElementById('voteModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('voteModal').style.display = 'none';
            selectedTarget = null;
        }

        document.getElementById('confirmVoteBtn').onclick = () => {
            if(selectedTarget && !myVote) {
                db.ref('rooms/' + code + '/votes/' + safeMe).set(selectedTarget).then(() => closeModal());
            }
        };

        document.getElementById('skipBtn').onclick = () => {
            if(!myVote) {
                db.ref('rooms/' + code + '/votes/' + safeMe).set("SKIP");
            }
        };

        function listenToVotes() {
            db.ref('rooms/' + code + '/votes').on('value', snap => {
                currentVotes = snap.val() || {};
                let alivePlayersCount = Object.keys(playersData).filter(p => !deadPlayers[p]).length;
                let totalVotesCast = Object.keys(currentVotes).length;

                if (currentPhase === 'day_vote' && totalVotesCast >= alivePlayersCount && alivePlayersCount > 0) {
                    if (isHost) setPhase('day_reveal', 10);
                }
                updateVotesUI();
            });
        }

        function updateVotesUI() {
            Object.keys(playersData).forEach(sName => {
                const nameTextEl = document.getElementById('nameText_' + sName);
                if(nameTextEl) nameTextEl.innerText = playersData[sName];
                const dotContainer = document.getElementById('dots_' + sName);
                if(dotContainer) dotContainer.innerHTML = "";
            });
            
            document.getElementById('skipVoteCount').innerText = "(0)";
            let voteCounts = {};
            let skipCount = 0;
            
            for(let voter in currentVotes) {
                const target = currentVotes[voter];
                if(target === "SKIP") skipCount++;
                else voteCounts[target] = (voteCounts[target] || 0) + 1;
            }

            if (currentPhase === 'day_reveal' || currentPhase === 'day_elimination') {
                document.getElementById('skipVoteCount').innerText = `(${skipCount})`;
                for(let target in voteCounts) {
                    const nameTextEl = document.getElementById('nameText_' + target);
                    if(nameTextEl && playersData[target]) {
                        nameTextEl.innerText = `${playersData[target]} (${voteCounts[target]})`;
                    }
                }
                for(let voter in currentVotes) {
                    const target = currentVotes[voter];
                    if(target !== "SKIP") {
                        const dotContainer = document.getElementById('dots_' + target);
                        if(dotContainer) {
                            const dot = document.createElement('div');
                            dot.className = 'vote-dot';
                            dotContainer.appendChild(dot);
                        }
                    }
                }
            }
        }

        function processElimination() {
            if (!isHost) return;
            db.ref('rooms/' + code + '/votes').once('value', snap => {
                const votes = snap.val() || {};
                let counts = {};
                let maxVotes = 0;
                let candidate = null;
                let isTie = false;
                let skipVotes = 0;

                for(let voter in votes) {
                    const target = votes[voter];
                    if(target === "SKIP") { skipVotes++; continue; }
                    counts[target] = (counts[target] || 0) + 1;

                    if(counts[target] > maxVotes) {
                        maxVotes = counts[target];
                        candidate = target;
                        isTie = false;
                    } else if(counts[target] === maxVotes) {
                        isTie = true;
                    }
                }

                let finalResult = "TIE";
                if(skipVotes >= maxVotes && skipVotes > 0) {
                    finalResult = "TIE";
                } else if(!isTie && candidate) {
                    finalResult = candidate;
                }

                db.ref('rooms/' + code + '/eliminationResult').set(finalResult).then(() => {
                    let updates = {};
                    
                    if(finalResult !== "TIE") {
                        updates['rooms/' + code + '/deadPlayers/' + finalResult] = true;
                        if(rolesData[finalResult] === "Canlı Bomba") {
                            for(let voter in votes) {
                                if(votes[voter] === finalResult) {
                                    updates['rooms/' + code + '/deadPlayers/' + voter] = true;
                                }
                            }
                        }
                    }

                    if(Object.keys(updates).length > 0) {
                        db.ref().update(updates).then(() => checkWinConditionAndTransition());
                    } else {
                        checkWinConditionAndTransition();
                    }
                });
            });
        }

        function checkWinConditionAndTransition() {
            db.ref('rooms/' + code).once('value', snap => {
                const r = snap.val();
                let aMaf = 0, aTown = 0;
                const dPlayers = r.deadPlayers || {};
                const rData = r.assignedRoles || {};
                const mafiaRolesList = ["Sadə Mafiya", "Don", "Vəkil", "Aypara", "Xəfiyyə Mafiya", "Hiyləgər Mafiya", "Gizli Mafiya"];
                
                Object.keys(r.players).forEach(p => {
                    if (!dPlayers[p]) {
                        let role = rData[p] || "Dinc Sakin";
                        if (mafiaRolesList.includes(role)) aMaf++;
                        else aTown++;
                    }
                });

                if (aMaf >= aTown && aMaf > 0) {
                    db.ref('rooms/' + code + '/winner').set('MAFIA');
                    setPhase('game_over', 9999);
                } else if (aMaf === 0) {
                    db.ref('rooms/' + code + '/winner').set('TOWN');
                    setPhase('game_over', 9999);
                } else {
                    setPhase('day_elimination', 6);
                }
            });
        }

        function listenToElimination() {
            db.ref('rooms/' + code + '/eliminationResult').on('value', snap => {
                latestEliminationResult = snap.val();
                if (currentPhase === 'day_elimination') {
                    renderEliminationUI();
                }
            });
            
            db.ref('rooms/' + code + '/winner').on('value', snap => {
                latestWinner = snap.val();
                if (currentPhase === 'game_over') {
                    renderGameOverUI();
                }
            });
        }

        function renderEliminationUI() {
            if (!latestEliminationResult) return;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainAreaContainer').style.display = 'none';
            document.getElementById('chatPanel').classList.remove('open');
            document.getElementById('voiceChatPanel').style.display = 'none';

            const result = latestEliminationResult;
            const mainTextEl = document.getElementById('resultMainText');
            const noteEl = document.getElementById('resultNote');

            if(result === "TIE") {
                mainTextEl.innerHTML = "HEÇ KİM ASILMADI!";
                mainTextEl.style.color = "#888888";
                mainTextEl.style.textShadow = "0 0 20px #555";
                noteEl.innerText = "Səslər bərabər oldu və ya hamı pas keçdi.";
            } else {
                const hungName = playersData[result] || "Bilinməyən Oyunçu";
                const realRole = rolesData[result] || "Dinc Sakin";

                mainTextEl.style.color = "#ff0000";
                mainTextEl.style.textShadow = "0 0 40px rgba(255, 0, 0, 1)";

                if(realRole === "Gizli Mafiya" || realRole === "Hiyləgər Mafiya") {
                    mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: Dinc Sakin`;
                    noteEl.innerText = "O, Gizli Mafiya idi! Öldüyü üçün əsl rolu şəhərdən gizlədildi.";
                } else if(realRole === "Psixopat") {
                    mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: ${realRole}`;
                    noteEl.innerText = "O, Psixopat idi! İlk asılmadan sağ çıxdı və ölmədi!";
                } else if(realRole === "Canlı Bomba") {
                    mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: ${realRole}`;
                    noteEl.innerText = "O, Canlı Bomba idi! Ona səs verənlərin hamısı partladı!";
                } else {
                    mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: ${realRole}`;
                    noteEl.innerText = "Şəhər sakinləri bir təhlükəni daha yox etdi.";
                }
            }
            document.getElementById('resultOverlay').style.display = 'flex';
        }

        function renderGameOverUI() {
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainAreaContainer').style.display = 'none';
            document.getElementById('chatPanel').classList.remove('open');
            document.getElementById('voiceChatPanel').style.display = 'none';
            
            const mainTextEl = document.getElementById('resultMainText');
            const noteEl = document.getElementById('resultNote');
            
            if(latestWinner === 'MAFIA') {
                mainTextEl.innerHTML = "MAFİYA QAZANDI!";
                mainTextEl.style.color = "#ff0000";
                mainTextEl.style.textShadow = "0 0 40px #ff0000";
                noteEl.innerText = "Mafiyaların sayı dinc sakinlərin sayına çatdı. Şəhər tamamilə ələ keçirildi!";
            } else {
                mainTextEl.innerHTML = "ŞƏHƏR QAZANDI!";
                mainTextEl.style.color = "#4ade80";
                mainTextEl.style.textShadow = "0 0 40px #4ade80";
                noteEl.innerText = "Bütün mafiyalar yox edildi. Şəhərdə sülh bərpa olundu!";
            }
            document.getElementById('resultOverlay').style.display = 'flex';
            
            db.ref('rooms/' + code).off();
            db.ref('rooms/' + code + '/votes').off();
            db.ref('rooms/' + code + '/chat').off();
            leaveVoiceChat();
        }

        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('open');
            document.getElementById('chatNotif').style.display = 'none';
        }
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;

            db.ref('rooms/' + code + '/chat').push({ sender: me, msg: txt, time: Date.now() });
            input.value = "";
        }
        document.getElementById('chatInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); sendMessage(); }
        });
        function listenToChat() {
            db.ref('rooms/' + code + '/chat').on('child_added', snap => {
                const data = snap.val();
                const box = document.getElementById('chatMessages');
                box.innerHTML += `<div class="msg"><span>${data.sender}:</span> ${data.msg}</div>`;
                box.scrollTop = box.scrollHeight;
                const panel = document.getElementById('chatPanel');
                if(!panel.classList.contains('open') && data.sender !== me) {
                    document.getElementById('chatNotif').style.display = 'inline';
                }
            });
        }

        const AGORA_APP_ID = "0b6c9c3436ad44baa6fdadc8d60971e3"; 
        const CHANNEL_NAME = code ? code.toString() : "MafiaRoom"; 
        const TOKEN = null; 
        let rtc = { client: null, localAudioTrack: null };
        let isMuted = false;

        async function joinVoiceChat() {
            if(deadPlayers[safeMe]) { alert("Ölülər səsli çata qoşula bilməz!"); return; }
            try {
                document.getElementById("vc-status").innerText = "Qoşulur...";
                
                if (!rtc.client) {
                    rtc.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                    rtc.client.on("user-published", async (user, mediaType) => {
                        await rtc.client.subscribe(user, mediaType);
                        if (mediaType === "audio") user.audioTrack.play();
                    });
                }

                await rtc.client.join(AGORA_APP_ID, CHANNEL_NAME, TOKEN, safeMe);
                rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await rtc.client.publish([rtc.localAudioTrack]);
                
                document.getElementById("vc-status").innerText = "Kanala Qoşulub";
                document.getElementById("vc-status").style.color = "#4ade80";
                document.getElementById("btn-join-vc").style.display = "none";
                document.getElementById("btn-mute-vc").style.display = "inline-block";
                document.getElementById("btn-leave-vc").style.display = "inline-block";
            } catch (error) { 
                console.error(error);
                document.getElementById("vc-status").innerText = "Qoşulmadı! Testing Mode aktiv deyil və ya local deyil.";
                document.getElementById("vc-status").style.color = "#ff0000";
                document.getElementById("btn-join-vc").style.display = "inline-block";
                document.getElementById("btn-mute-vc").style.display = "none";
                document.getElementById("btn-leave-vc").style.display = "none";
            }
        }

        async function toggleMute() {
            if (!rtc.localAudioTrack) return;
            const btn = document.getElementById("btn-mute-vc");
            
            if (!isMuted) {
                await rtc.localAudioTrack.setEnabled(false);
                isMuted = true;
                btn.innerText = "SƏSİ AÇ";
                btn.style.backgroundColor = "#4ade80";
            } else {
                await rtc.localAudioTrack.setEnabled(true);
                isMuted = false;
                btn.innerText = "SƏSİ BAĞLA";
                btn.style.backgroundColor = "#ff4d4d";
            }
        }

        async function leaveVoiceChat() {
            if (rtc.localAudioTrack) { rtc.localAudioTrack.close(); rtc.localAudioTrack = null; }
            if (rtc.client) await rtc.client.leave();
            document.getElementById("vc-status").innerText = "Qoşulmayıb";
            document.getElementById("vc-status").style.color = "#aaa";
            document.getElementById("btn-join-vc").style.display = "inline-block";
            document.getElementById("btn-mute-vc").style.display = "none";
            document.getElementById("btn-leave-vc").style.display = "none";
        }
        window.addEventListener("beforeunload", leaveVoiceChat);
    </script>
</body>
</html>
