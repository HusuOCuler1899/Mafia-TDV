<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GÜNDÜZ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body, html { height: 100%; background-color: #000; color: white; overflow-x: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0, 100, 255, 0.2); border-bottom: 2px solid #0055ff; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #ffaa00; text-transform: uppercase; }
        .timer-box { font-size: 1.8rem; font-weight: bold; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        
        .header-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .role-btn { background: #eab308; color: black; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .chat-btn { background: #00aaff; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        .main-area { display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 60vh; position: relative; }
        
        /* 5x6 CƏDVƏL SİSTEMİ */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 70vh; margin-top: 10px; }
        .player-card { background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; text-align: center; transition: 0.2s; position: relative; }
        .player-card.alive { border-color: #00aaff; cursor: pointer; }
        .player-card.alive:hover { background: rgba(0, 170, 255, 0.2); }
        .player-card.dead { border-color: #ff0000; filter: grayscale(100%) opacity(0.5); pointer-events: none; }
        .player-card.selected { border-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.8); background: rgba(255, 204, 0, 0.2); }
        
        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        .p-votes { font-size: 1rem; color: #ffcc00; margin-top: 5px; font-weight: bold; background: #000; padding: 2px 5px; border-radius: 4px; }
        .p-status { font-size: 0.7rem; color: #ff0000; margin-top: 3px; font-weight: 900; }

        .control-panel { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .action-btn { padding: 12px 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-host { background: #ff00ff; color: white; display: none; }
        .btn-vote { background: #ffaa00; color: black; display: none; }

        /* Rol Modalı və Gecə Nəticəsi Overlay */
        #roleModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2500; }
        .role-box { background: #1a1a1a; border: 3px solid #eab308; padding: 40px; text-align: center; border-radius: 12px; }
        .role-text-value { font-size: 2.2rem; color: #eab308; font-weight: bold; text-transform: uppercase; margin-bottom: 25px; }

        #nightResultOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; padding: 20px; border: 5px solid #00aaff; }
        #nightResultText { font-size: clamp(1.5rem, 4vw, 3rem); color: #00aaff; font-weight: 900; line-height: 1.5; margin-bottom: 20px; text-shadow: 0 0 20px #00aaff; }

        /* Çat Sistemi (Normal Çat) */
        #chatPanel { position: fixed; top: 60px; right: -350px; width: 300px; height: calc(100% - 60px); background: rgba(0,0,0,0.95); border-left: 2px solid #00aaff; transition: right 0.3s ease; display: flex; flex-direction: column; z-index: 1000; }
        #chatPanel.open { right: 0; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { font-size: 0.9rem; word-break: break-word; }
        .msg span { font-weight: bold; color: #00aaff; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        .chat-input-area input { flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; outline: none; }
        .chat-input-area button { background: #00aaff; color: white; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }

        /* Tam Qara Asılma Ekranı */
        #resultOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 4000; text-align: center; padding: 20px; }
        #resultMainText { font-size: clamp(2rem, 6vw, 4rem); color: #ff0000; font-weight: 900; text-shadow: 0 0 30px rgba(255, 0, 0, 1); text-transform: uppercase; line-height: 1.5; }
        #resultNote { font-size: 1.5rem; color: #baa7a7; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { history.pushState(null, null, window.location.href); });
    </script>

    <div class="bg"></div>

    <header id="mainHeader">
        <button class="header-btn" onclick="exitGame()">ÇIX (ÖL)</button>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="phase-title" id="phaseText">MÜZAKİRƏ MƏRHƏLƏSİ</div>
            <div class="timer-box" id="timerDisplay">--</div>
        </div>
        <div>
            <button class="role-btn" onclick="showMyRole()">ROLU ÖYRƏN</button>
            <button class="chat-btn" onclick="toggleChat()">YAZILI ÇAT</button>
        </div>
    </header>

    <div class="main-area" id="mainAreaContainer">
        <div class="grid-container" id="playerGrid"></div>

        <div class="control-panel">
            <button class="action-btn btn-vote" id="voteBtn" onclick="castVote()">Səs Ver</button>
            <button class="action-btn btn-vote" id="skipBtn" style="background:#555; color:white;" onclick="skipVote()">SƏSİ BOŞA VER (SKIP) (<span id="skipCount">0</span>)</button>
            <button class="action-btn btn-host" id="hostStartVoteBtn" onclick="startVotingPhase()">SƏSVERMƏ BAŞLAT (45s)</button>
        </div>
    </div>

    <div id="chatPanel">
        <div style="background:#00aaff; color:white; padding:10px; text-align:center; font-weight:bold;">ÜMUMİ ÇAT</div>
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yaz...">
            <button onclick="sendMessage()">Göndər</button>
        </div>
    </div>

    <div id="roleModal">
        <div class="role-box">
            <div style="color:#aaa;">Sənin Əsl Rolun:</div>
            <div class="role-text-value" id="myRoleValue">YÜKLƏNİR...</div>
            <button class="header-btn" onclick="document.getElementById('roleModal').style.display='none'">BAĞLA</button>
        </div>
    </div>

    <div id="nightResultOverlay">
        <div id="nightResultText"></div>
        <button class="action-btn btn-vote" style="display:block; margin:0 auto;" onclick="document.getElementById('nightResultOverlay').style.display='none'">DAVAM ET</button>
    </div>

    <div id="resultOverlay">
        <div id="resultMainText"></div>
        <div id="resultNote"></div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <div id="voice-chat-panel" style="background: #1f2833; border: 2px solid #66fcf1; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 400px; text-align: center; position:relative; z-index:100;">
        <h3 style="color: #66fcf1; margin-top: 0; margin-bottom: 5px;">SƏSLİ ÇAT</h3>
        <p id="vc-status" style="color: #c5c6c7; font-size: 14px;">Status: Qoşulmayıb (HTTPS və ya Localhost tələb edir)</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="action-btn" id="btn-join-vc" onclick="joinVoiceChat()" style="background: #66fcf1; color: black;">Qoşul</button>
            <button class="action-btn" id="btn-mute-vc" onclick="toggleMute()" style="background: #ff4d4d; color: white; display: none;">Səsi Bağla</button>
            <button class="action-btn" id="btn-leave-vc" onclick="leaveVoiceChat()" style="background: #555; color: white; display: none;">Çıx</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let playersData = {};
        let deadPlayers = {};
        let rolesData = {};
        let currentPhase = "";
        let votes = {};
        let mySelectedTarget = null;
        let amIDead = false;
        let timerInterval = null;
        let voteProcessed = false;

        db.ref('rooms/' + code).once('value', snap => {
            const room = snap.val();
            if(!room) return;
            isHost = (room.host === me);
            
            if(isHost && room.gameState !== 'day_discuss' && room.gameState !== 'day_voting' && room.gameState !== 'day_reveal' && room.gameState !== 'day_elimination') {
                db.ref('rooms/' + code + '/votes').remove();
                db.ref('rooms/' + code + '/eliminationResult').remove();
                db.ref('rooms/' + code).update({ gameState: 'day_discuss' });
            }

            if(room.lastNightSummary && !sessionStorage.getItem('seenSummary_' + room.nightCounter)) {
                document.getElementById('nightResultText').innerText = room.lastNightSummary;
                document.getElementById('nightResultOverlay').style.display = 'flex';
                sessionStorage.setItem('seenSummary_' + room.nightCounter, "true");
            }

            listenToRoomUpdates();
            // Əgər listenToChat() funksiyası varsa, burada saxlayırıq. 
            if (typeof listenToChat === "function") listenToChat();
        });

        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;

                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                rolesData = room.assignedRoles || {};
                votes = room.votes || {};
                amIDead = !!deadPlayers[safeMe];

                if(room.gameState !== currentPhase) {
                    currentPhase = room.gameState;
                    handlePhaseChange(room);
                }

                buildGrid();

                // OYUN BİTDİKDƏ EKRANA ÇIXARMA
                if (currentPhase === 'game_over') {
                    document.getElementById('resultMainText').innerText = "OYUN BİTDİ!";
                    document.getElementById('resultNote').innerText = room.winner || "";
                    document.getElementById('resultOverlay').style.display = 'flex';
                    document.getElementById('resultOverlay').style.background = '#111';
                    
                    setTimeout(() => { window.location.href = "index.html"; }, 7000);
                }
                else if (currentPhase === 'day_elimination') {
                    renderEliminationUI(room.eliminationResult);
                } else if (currentPhase === 'night_phase') {
                    window.location.href = "gece.html?join=" + code;
                }
            });
        }

        function handlePhaseChange(room) {
            clearInterval(timerInterval);
            const endTime = room.phaseEndTime || 0;
            voteProcessed = false;

            if(isHost) {
                document.getElementById('hostStartVoteBtn').style.display = (currentPhase === 'day_discuss') ? 'block' : 'none';
            }

            if(currentPhase === 'day_discuss') {
                document.getElementById('phaseText').innerText = "MÜZAKİRƏ MƏRHƏLƏSİ";
                document.getElementById('phaseText').style.color = "#00aaff";
                document.getElementById('voteBtn').style.display = 'none';
                document.getElementById('skipBtn').style.display = 'none';
                mySelectedTarget = null;
                document.getElementById('timerDisplay').innerText = "--";
            } 
            else if (currentPhase === 'day_voting') {
                document.getElementById('phaseText').innerText = "SƏSVERMƏ MƏRHƏLƏSİ";
                document.getElementById('phaseText').style.color = "#ffaa00";
                if(!amIDead) {
                    document.getElementById('voteBtn').style.display = 'block';
                    document.getElementById('skipBtn').style.display = 'block';
                }
            }
            else if (currentPhase === 'day_reveal') {
                document.getElementById('phaseText').innerText = "NƏTİCƏLƏR AÇIQLANIR";
                document.getElementById('voteBtn').style.display = 'none';
                document.getElementById('skipBtn').style.display = 'none';
            }

            if(endTime > 0) {
                timerInterval = setInterval(() => {
                    let timeLeft = Math.ceil((endTime - Date.now()) / 1000);
                    if(timeLeft < 0) timeLeft = 0;
                    document.getElementById('timerDisplay').innerText = timeLeft;

                    if(timeLeft <= 0 && isHost && !voteProcessed) {
                        voteProcessed = true;
                        clearInterval(timerInterval);
                        if(currentPhase === 'day_voting') {
                            processVotingEnd(); 
                        } else if(currentPhase === 'day_reveal') {
                            finalizeElimination(); 
                        }
                    }
                }, 1000);
            }
        }

        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);

            let voteCounts = {};
            let skipC = 0;
            for(let voter in votes) {
                let target = votes[voter];
                if(target === "SKIP") skipC++;
                else voteCounts[target] = (voteCounts[target] || 0) + 1;
            }
            document.getElementById('skipCount').innerText = skipC;

            let aliveCount = pKeys.filter(p => !deadPlayers[p]).length;
            let totalVotes = Object.keys(votes).length;
            if (currentPhase === 'day_voting' && isHost && totalVotes >= aliveCount && aliveCount > 0 && !voteProcessed) {
                voteProcessed = true;
                processVotingEnd();
            }

            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';

                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];

                    if(deadPlayers[sName]) {
                        card.classList.add('dead');
                        card.innerHTML = `<div class="p-name">${pName}</div><div class="p-status">[ ÖLÜ ]</div>`;
                    } else {
                        card.classList.add('alive');
                        
                        let vCount = voteCounts[sName] || 0;
                        let voteHtml = (currentPhase === 'day_reveal' || currentPhase === 'day_elimination') && vCount > 0 
                                     ? `<div class="p-votes">${vCount} SƏS</div>` : "";
                        
                        card.innerHTML = `<div class="p-name">${pName}</div>${voteHtml}`;

                        if(!amIDead && currentPhase === 'day_voting' && sName !== safeMe) {
                            card.onclick = () => selectTarget(sName);
                        }
                    }

                    if(mySelectedTarget === sName) card.classList.add('selected');
                } else {
                    card.style.visibility = "hidden";
                }
                grid.appendChild(card);
            }
        }

        function selectTarget(targetSafeName) {
            mySelectedTarget = targetSafeName;
            buildGrid();
        }

        // --- PROBLEM 1: SƏS VƏ SKIP İKİSİ EYNİ ANDA SEÇİLMƏYƏCƏK ---
        function castVote() {
            if(!mySelectedTarget) { alert("Səs vermək üçün bir nəfər seçin!"); return; }
            db.ref('rooms/' + code + '/votes/' + safeMe).set(mySelectedTarget);
            
            document.getElementById('voteBtn').innerText = "SƏS VERİLDİ ✓";
            document.getElementById('skipBtn').innerHTML = "SƏSİ BOŞA VER (SKIP) (<span id='skipCount'>0</span>)";
        }

        function skipVote() {
            mySelectedTarget = null;
            db.ref('rooms/' + code + '/votes/' + safeMe).set("SKIP");
            
            document.getElementById('skipBtn').innerText = "SKİP EDİLDİ ✓";
            document.getElementById('voteBtn').innerText = "Səs Ver";
            buildGrid();
        }

        function showMyRole() {
            document.getElementById('myRoleValue').innerText = rolesData[safeMe] || "Dinc Sakin";
            document.getElementById('roleModal').style.display = "flex";
        }

        function exitGame() {
            if(confirm("Oyundan çıxsanız ölü sayılacaqsınız. Əminsiniz?")) {
                db.ref('rooms/' + code + '/deadPlayers/' + safeMe).set(true).then(() => { window.location.href = "index.html"; });
            }
        }

        function startVotingPhase() {
            if(!isHost) return;
            db.ref('rooms/' + code).update({ 
                gameState: 'day_voting', 
                votes: null,
                phaseEndTime: Date.now() + 45000
            });
        }

        function processVotingEnd() {
            if(!isHost) return;
            
            db.ref('rooms/' + code + '/votes').once('value', snap => {
                let currentVotes = snap.val() || {};
                let updates = {};
                
                Object.keys(playersData).forEach(pKey => {
                    if(!deadPlayers[pKey] && !currentVotes[pKey]) {
                        updates['rooms/' + code + '/votes/' + pKey] = "SKIP";
                    }
                });
                
                if (Object.keys(updates).length > 0) db.ref().update(update
