<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GÜNDÜZ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Şriftlərin düzgün işləməsi üçün sistem şriftləri */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); }
        
        /* Üst Panel */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,0,0,0.1); border-bottom: 2px solid #ff0000; height: 60px; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #ff0000; text-transform: uppercase; letter-spacing: 2px; }
        .timer-box { font-size: 1.8rem; font-weight: bold; color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .chat-toggle-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        /* Əsas Cədvəl (5 Sütun, 6 Sətir = 30 Nəfər) */
        .main-area { display: flex; flex-direction: column; align-items: center; height: calc(100% - 60px); padding: 10px; position: relative; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 80vh;
        }
        
        /* Oyunçu Qutusu */
        .player-card { 
            background: rgba(0,0,0,0.7); border: 2px solid #444; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 5px; cursor: pointer; position: relative; transition: 0.2s; text-align: center;
        }
        .player-card.active-vote:hover { border-color: #ff0000; background: rgba(255,0,0,0.2); }
        .player-card.dead { filter: grayscale(100%) opacity(0.5); pointer-events: none; border-color: #222 !important; }
        .player-card.voted-for { border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
        
        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        
        /* Səs İkonları */
        .vote-dots { display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; margin-top: 5px; min-height: 12px; width: 100%; }
        .vote-dot { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 5px #000; }

        /* Skip Düyməsi */
        .skip-btn { margin-top: 10px; background: #555; color: white; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border: 2px solid #888; border-radius: 5px; cursor: pointer; display: none; }
        .skip-btn:hover { background: #777; }

        /* Çat Sistemi */
        #chatPanel { 
            position: fixed; top: 60px; right: -350px; width: 300px; height: calc(100% - 60px); 
            background: rgba(0,0,0,0.95); border-left: 2px solid #ff0000; transition: right 0.3s ease; 
            display: flex; flex-direction: column; z-index: 1000; 
        }
        #chatPanel.open { right: 0; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { font-size: 0.9rem; word-break: break-word; }
        .msg span { font-weight: bold; color: #ff0000; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #444; }
        .chat-input-area input { flex-grow: 1; padding: 8px; background: #222; color: white; border: 1px solid #555; outline: none; }
        .chat-input-area button { background: #ff0000; color: white; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; }

        /* Təsdiq Modalı */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #111; border: 2px solid #ff0000; padding: 30px; text-align: center; border-radius: 10px; max-width: 400px; width: 90%; }
        .modal-title { font-size: 1.5rem; color: white; margin-bottom: 20px; }
        .modal-btns { display: flex; justify-content: center; gap: 15px; }
        .modal-btns button { padding: 12px 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-yes { background: #ff0000; color: white; }
        .btn-no { background: #555; color: white; }

        /* Nəticə və Asılma Ekranı (Tam Qara Ekran) */
        #resultOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 3000; 
            text-align: center; padding: 20px; 
        }
        #resultMainText { 
            font-size: clamp(2.2rem, 6vw, 4.5rem); 
            color: #ff0000; font-weight: 900; letter-spacing: 3px; 
            margin-bottom: 25px; text-shadow: 0 0 30px rgba(255, 0, 0, 0.7); 
            text-transform: uppercase; line-height: 1.3;
        }
        #resultNote { font-size: 1.5rem; color: #baa7a7; max-width: 700px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg"></div></div>

    <header>
        <div class="phase-title" id="phaseText">SÖHBƏT VAXTI</div>
        <div class="timer-box" id="timerDisplay">30</div>
        <button class="chat-toggle-btn" onclick="toggleChat()">Çat <span id="chatNotif" style="display:none;color:#ffeb3b;">(!)</span></button>
    </header>

    <div class="main-area">
        <div class="grid-container" id="playerGrid"></div>
        <button class="skip-btn" id="skipBtn">SƏSİ BOŞA VER (SKIP) <span id="skipVoteCount">(0)</span></button>
    </div>

    <div id="chatPanel">
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yaz..." autocomplete="off">
            <button onclick="sendMessage()">GÖNDƏR</button>
        </div>
    </div>

    <div class="modal-overlay" id="voteModal">
        <div class="modal-box">
            <div class="modal-title" id="voteModalTitle">Əminsən?</div>
            <div class="modal-btns">
                <button class="btn-yes" id="confirmVoteBtn">BƏLİ, ASILSIN!</button>
                <button class="btn-no" onclick="closeModal()">LƏĞV ET</button>
            </div>
        </div>
    </div>

    <div id="resultOverlay">
        <div id="resultMainText"></div>
        <div id="resultNote"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let currentPhase = "";
        let playersData = {};
        let deadPlayers = {};
        let myVote = null;
        let selectedTarget = null;
        let rolesData = {};
        let gridBuilt = false;

        // Otaq məlumatlarını bir dəfə çək və əsas dinləyiciləri başlat
        db.ref('rooms/' + code).once('value', snapshot => {
            const room = snapshot.val();
            if(!room) { window.location.href = "index.html"; return; }
            
            isHost = (room.host === me);
            playersData = room.players || {};
            rolesData = room.assignedRoles || {};
            deadPlayers = room.deadPlayers || {};

            // Söhbət fazasını başlat (Yalnız host idarə edir ki sinxron olsun)
            if(isHost && room.gameState !== 'day_discuss') {
                setPhase('day_discuss', 30);
                db.ref('rooms/' + code + '/votes').remove(); 
                db.ref('rooms/' + code + '/eliminationResult').remove(); 
            }

            listenToRoomUpdates();
            listenToVotes();
            listenToChat();
        });

        // Həm oyunçu vəziyyətlərini, həm də fazaları izləyən əsas sinxronizasiya funksiyası
        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;
                
                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                rolesData = room.assignedRoles || {};

                // Grid hər dəfə tam dataya görə sıfırdan qurulur və ya yenilənir
                buildGrid();

                if(room.gameState !== currentPhase) {
                    currentPhase = room.gameState;
                    handlePhaseChange(room);
                }
            });
        }

        // 30 Nəfərlik Cədvəlin Yaradılması
        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);
            
            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';
                
                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];
                    card.id = "card_" + sName;
                    
                    if(deadPlayers[sName]) {
                        card.classList.add('dead');
                    }

                    card.innerHTML = `
                        <div class="p-name" id="nameText_${sName}">${pName}</div>
                        <div class="vote-dots" id="dots_${sName}"></div>
                    `;

                    // Əgər oylama vaxtıdırsa və klikləyən də, hədəf də diridirsə
                    if(currentPhase === 'day_vote' && !deadPlayers[sName] && !deadPlayers[safeMe] && !myVote) {
                        card.classList.add('active-vote');
                    }

                    card.onclick = () => {
                        if(currentPhase === 'day_vote' && !deadPlayers[sName] && !deadPlayers[safeMe] && !myVote) {
                            openModal(sName, pName);
                        }
                    };
                } else {
                    card.style.visibility = "hidden"; 
                }
                grid.appendChild(card);
            }
        }

        let timerInterval = null;

        function handlePhaseChange(room) {
            clearInterval(timerInterval);
            const endTime = room.phaseEndTime || 0;
            
            timerInterval = setInterval(() => {
                let timeLeft = Math.ceil((endTime - Date.now()) / 1000);
                if(timeLeft < 0) timeLeft = 0;
                
                document.getElementById('timerDisplay').innerText = timeLeft;

                // Fazalara uyğun vizual idarəetmə
                if(currentPhase === 'day_discuss') {
                    document.getElementById('phaseText').innerText = "SÖHBƏT VAXTI";
                    document.getElementById('skipBtn').style.display = 'none';
                    document.getElementById('resultOverlay').style.display = 'none';
                    myVote = null; 
                } 
                else if(currentPhase === 'day_vote') {
                    document.getElementById('phaseText').innerText = "OYLAMA BAŞLADI!";
                    if(!deadPlayers[safeMe] && !myVote) {
                        document.getElementById('skipBtn').style.display = 'block';
                    } else {
                        document.getElementById('skipBtn').style.display = 'none';
                    }
                } 
                else if(currentPhase === 'day_reveal') {
                    document.getElementById('phaseText').innerText = "SƏSLƏR SAYILIR";
                    document.getElementById('skipBtn').style.display = 'none';
                    closeModal();
                } 
                else if(currentPhase === 'day_elimination') {
                    document.getElementById('phaseText').innerText = "ASILMA ANI";
                    document.getElementById('skipBtn').style.display = 'none';
                }

                // Vaxt bitdikdə avtomatik keçidlər (Yalnız Host idarə edir)
                if(timeLeft <= 0 && isHost) {
                    if(currentPhase === 'day_discuss') {
                        setPhase('day_vote', 45); 
                    } else if(currentPhase === 'day_vote') {
                        setPhase('day_reveal', 10); 
                    } else if(currentPhase === 'day_reveal') {
                        processElimination(); 
                    } else if(currentPhase === 'day_elimination') {
                        db.ref('rooms/' + code + '/gameState').set('night_phase');
                        window.location.href = "gece.html?join=" + code;
                    }
                }
                
                // Qeyri-host oyunçular üçün vaxt bitəndə gecəyə keçid
                if(timeLeft <= 0 && !isHost && currentPhase === 'day_elimination') {
                    setTimeout(() => { window.location.href = "gece.html?join=" + code; }, 1500);
                }

            }, 1000);
        }

        function setPhase(phaseName, seconds) {
            db.ref('rooms/' + code).update({
                gameState: phaseName,
                phaseEndTime: Date.now() + (seconds * 1000)
            });
        }

        // Oylama Modalı
        function openModal(targetSafeName, targetName) {
            selectedTarget = targetSafeName;
            document.getElementById('voteModalTitle').innerText = `Əminsən ki, ${targetName} üçün səs verəsən?`;
            document.getElementById('voteModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('voteModal').style.display = 'none';
            selectedTarget = null;
        }

        document.getElementById('confirmVoteBtn').onclick = () => {
            if(selectedTarget) {
                myVote = selectedTarget;
                db.ref('rooms/' + code + '/votes/' + safeMe).set(selectedTarget);
                const targetCard = document.getElementById('card_' + selectedTarget);
                if(targetCard) targetCard.classList.add('voted-for');
                closeModal();
                document.getElementById('skipBtn').style.display = 'none';
                buildGrid();
            }
        };

        document.getElementById('skipBtn').onclick = () => {
            myVote = "SKIP";
            db.ref('rooms/' + code + '/votes/' + safeMe).set("SKIP");
            closeModal();
            document.getElementById('skipBtn').style.display = 'none';
            buildGrid();
        };

        // Səslərin Ekranda və Kartlarda Canlı Yenilənməsi
        function listenToVotes() {
            db.ref('rooms/' + code + '/votes').on('value', snap => {
                const votes = snap.val() || {};
                
                // Adları və nöqtələri sıfırla
                Object.keys(playersData).forEach(sName => {
                    const nameTextEl = document.getElementById('nameText_' + sName);
                    if(nameTextEl) nameTextEl.innerText = playersData[sName];
                    const dotContainer = document.getElementById('dots_' + sName);
                    if(dotContainer) dotContainer.innerHTML = "";
                });
                document.getElementById('skipVoteCount').innerText = "(0)";

                if (currentPhase === 'day_discuss') return; 
                
                let voteCounts = {};
                let skipCount = 0;

                for(let voter in votes) {
                    const target = votes[voter];
                    if(target === "SKIP") {
                        skipCount++;
                    } else {
                        voteCounts[target] = (voteCounts[target] || 0) + 1;
                    }
                }

                // Səs saylarını yaz
                for(let target in voteCounts) {
                    const nameTextEl = document.getElementById('nameText_' + target);
                    if(nameTextEl && playersData[target]) {
                        nameTextEl.innerText = `${playersData[target]} (${voteCounts[target]})`;
                    }
                }
                
                document.getElementById('skipVoteCount').innerText = `(${skipCount})`;

                // Nöqtələri çıxar (Reveal və ya Elimination-da)
                if(currentPhase === 'day_reveal' || currentPhase === 'day_elimination') {
                    for(let voter in votes) {
                        const target = votes[voter];
                        if(target !== "SKIP") {
                            const dotContainer = document.getElementById('dots_' + target);
                            if(dotContainer) {
                                dotContainer.innerHTML += '<div class="vote-dot"></div>';
                            }
                        }
                    }
                }

                // AVTOMATİK BİTMƏ: Hər kəs səs verdikdə gözləmədən keç
                if(currentPhase === 'day_vote') {
                    const totalPlayers = Object.keys(playersData);
                    const totalDead = Object.keys(deadPlayers);
                    const aliveCount = totalPlayers.filter(p => !totalDead.includes(p)).length;
                    const voteCount = Object.keys(votes).length;

                    if(voteCount >= aliveCount && aliveCount > 0 && isHost) {
                        setPhase('day_reveal', 10); 
                    }
                }
            });
        }

        // Asılma Hesablaması (Yalnız Host tərəfindən icra olunur)
        function processElimination() {
            db.ref('rooms/' + code + '/votes').once('value', snap => {
                const votes = snap.val() || {};
                let counts = {};
                let maxVotes = 0;
                let candidate = null;
                let isTie = false;
                let skipVotes = 0;

                for(let voter in votes) {
                    const target = votes[voter];
                    if(target === "SKIP") {
                        skipVotes++;
                        continue;
                    }
                    counts[target] = (counts[target] || 0) + 1;
                    
                    if(counts[target] > maxVotes) {
                        maxVotes = counts[target];
                        candidate = target;
                        isTie = false;
                    } else if(counts[target] === maxVotes) {
                        isTie = true;
                    }
                }

                if(skipVotes >= maxVotes && skipVotes > 0) {
                    db.ref('rooms/' + code + '/eliminationResult').set("TIE");
                } else if(isTie || !candidate) {
                    db.ref('rooms/' + code + '/eliminationResult').set("TIE");
                } else {
                    db.ref('rooms/' + code + '/eliminationResult').set(candidate);
                }

                setPhase('day_elimination', 10); 
            });
        }

        // Qara Arxa Fonlu Böyük Nəticə Ekranı Dinləyicisi
        db.ref('rooms/' + code + '/eliminationResult').on('value', snap => {
            const result = snap.val();
            if(!result || currentPhase !== 'day_elimination') {
                document.getElementById('resultOverlay').style.display = 'none';
                return;
            }

            const mainTextEl = document.getElementById('resultMainText');
            const noteEl = document.getElementById('resultNote');

            if(result === "TIE") {
                mainTextEl.innerHTML = "HEÇ KİM ASILMADI!";
                mainTextEl.style.color = "#888888";
                mainTextEl.style.textShadow = "0 0 20px #555";
                noteEl.innerText = "Səslər bərabər bölündü və ya çoxluq SKIP edildi.";
            } else {
                const hungName = playersData[result] || "Bilinməyən Oyunçu";
                const realRole = rolesData[result] || "Dinc Sakin";
                
                mainTextEl.style.color = "#ff0000";
                mainTextEl.style.textShadow = "0 0 30px rgba(255, 0, 0, 0.9)";

                // İstədiyiniz xüsusi format: qırmızı böyük hərflərlə ad və rol
                mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: ${realRole}`;
                
                // Xüsusi rolların daxili işləmə mexanizmləri və qeydləri
                if(realRole === "Gizli Mafiya") {
                    mainTextEl.innerHTML = `ADAMIN ADI: ${hungName}<br>ROLU BUDUR: Dinc Sakin`;
                    noteEl.innerText = "O, Gizli Mafiya idi! Öldüyü üçün şəhərə dinc sakin kimi göstərildi.";
                    if(isHost) db.ref('rooms/' + code + '/deadPlayers/' + result).set(true);
                } 
                else if(realRole === "Psixopat") {
                    noteEl.innerText = "O, Psixopat idi! İlk asılmadan sağ çıxmağı bacardı və ölmədi!";
                }
                else if(realRole === "Canlı Bomba") {
                    noteEl.innerText = "O, Canlı Bomba idi! Ona səs verən hər kəs partlayışda məhv oldu!";
                    if(isHost) {
                        db.ref('rooms/' + code + '/deadPlayers/' + result).set(true);
                        db.ref('rooms/' + code + '/votes').once('value', vSnap => {
                            const vs = vSnap.val() || {};
                            for(let v in vs) { 
                                if(vs[v] === result) db.ref('rooms/' + code + '/deadPlayers/' + v).set(true); 
                            }
                        });
                    }
                }
                else {
                    noteEl.innerText = "Şəhər əhalisi səsvermə ilə qərarını verdi.";
                    if(isHost) db.ref('rooms/' + code + '/deadPlayers/' + result).set(true);
                }
            }
            
            // Qara ekranı tam göstər
            document.getElementById('resultOverlay').style.display = 'flex';
        });

        // ÇAT SİSTEMİ
        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('open');
            document.getElementById('chatNotif').style.display = 'none';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt) return;
            
            db.ref('rooms/' + code + '/chat').push({
                sender: me,
                msg: txt,
                time: Date.now()
            });
            input.value = "";
        }

        document.getElementById('chatInput').addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); sendMessage(); }
        });

        function listenToChat() {
            db.ref('rooms/' + code + '/chat').on('child_added', snap => {
                const data = snap.val();
                const box = document.getElementById('chatMessages');
                box.innerHTML += `<div class="msg"><span>${data.sender}:</span> ${data.msg}</div>`;
                box.scrollTop = box.scrollHeight;

                const panel = document.getElementById('chatPanel');
                if(!panel.classList.contains('open') && data.sender !== me) {
                    document.getElementById('chatNotif').style.display = 'inline';
                }
            });
        }
    </script>
</body>
</html>
