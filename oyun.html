<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GÜNDÜZ | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body, html { height: 100%; background-color: #000; color: white; overflow-x: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0, 100, 255, 0.2); border-bottom: 2px solid #0055ff; }
        .phase-title { font-size: 1.5rem; font-weight: bold; color: #ffaa00; text-transform: uppercase; }
        
        .header-btn { background: #ff0000; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .role-btn { background: #eab308; color: black; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        .main-area { display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 70vh; position: relative; }
        
        /* 5x6 CƏDVƏL SİSTEMİ */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 8px; width: 100%; max-width: 900px; flex-grow: 1; max-height: 75vh; margin-top: 10px; }
        .player-card { background: rgba(0,0,0,0.8); border: 2px solid #333; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; text-align: center; transition: 0.2s; position: relative; }
        .player-card.alive { border-color: #00aaff; cursor: pointer; }
        .player-card.alive:hover { background: rgba(0, 170, 255, 0.2); }
        .player-card.dead { border-color: #ff0000; filter: grayscale(100%) opacity(0.5); pointer-events: none; }
        .player-card.selected { border-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.8); background: rgba(255, 204, 0, 0.2); }
        
        .p-name { font-size: clamp(0.7rem, 2vw, 1rem); font-weight: bold; word-break: break-word; }
        .p-votes { font-size: 0.8rem; color: #ffcc00; margin-top: 3px; font-weight: bold; }
        .p-status { font-size: 0.7rem; color: #ff0000; margin-top: 3px; font-weight: 900; }

        .control-panel { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .action-btn { padding: 12px 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-host { background: #ff00ff; color: white; display: none; }
        .btn-vote { background: #ffaa00; color: black; display: none; }

        /* Rol Modalı */
        #roleModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2500; }
        .role-box { background: #1a1a1a; border: 3px solid #eab308; padding: 40px; text-align: center; border-radius: 12px; }
        .role-text-value { font-size: 2.2rem; color: #eab308; font-weight: bold; text-transform: uppercase; margin-bottom: 25px; }
        
        /* Tam Qara Nəticə Ekranı */
        #resultOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; text-align: center; padding: 20px; }
        #resultMainText { font-size: clamp(2rem, 6vw, 4rem); color: #ff0000; font-weight: 900; text-shadow: 0 0 30px rgba(255, 0, 0, 1); text-transform: uppercase; line-height: 1.5; }
        #resultNote { font-size: 1.5rem; color: #baa7a7; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { history.pushState(null, null, window.location.href); });
    </script>

    <div class="bg"></div>
    <header id="mainHeader">
        <button class="header-btn" onclick="exitGame()">ÇIX</button>
        <div class="phase-title" id="phaseText">MÜZAKİRƏ MƏRHƏLƏSİ</div>
        <button class="role-btn" onclick="showMyRole()">ROLU ÖYRƏN</button>
    </header>

    <div class="main-area" id="mainAreaContainer">
        <div class="grid-container" id="playerGrid"></div>

        <div class="control-panel">
            <button class="action-btn btn-vote" id="voteBtn" onclick="castVote()">Səsini Təsdiqlə</button>
            <button class="action-btn btn-host" id="hostStartVoteBtn" onclick="startVotingPhase()">Səsverməyə Keç</button>
            <button class="action-btn btn-host" id="hostEndVoteBtn" onclick="endVotingPhase()">Asma Qərarı / Gecəyə Keç</button>
        </div>
    </div>

    <div id="roleModal">
        <div class="role-box">
            <div style="color:#aaa;">Sənin Əsl Rolun:</div>
            <div class="role-text-value" id="myRoleValue">YÜKLƏNİR...</div>
            <button class="header-btn" onclick="document.getElementById('roleModal').style.display='none'">BAĞLA</button>
        </div>
    </div>

    <div id="resultOverlay">
        <div id="resultMainText"></div>
        <div id="resultNote"></div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <div id="voice-chat-panel" style="background: #1f2833; border: 2px solid #66fcf1; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 400px; text-align: center; font-family: sans-serif; position:relative; z-index:100;">
        <h3 style="color: #66fcf1; margin-top: 0; margin-bottom: 5px;">Oyun İçi Səsli Çat</h3>
        <p id="vc-status" style="color: #c5c6c7; font-size: 14px;">Status: Səsli çata qoşulmayıb</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="action-btn" id="btn-join-vc" onclick="joinVoiceChat()" style="background: #66fcf1; color: black;">Çata Qoşul</button>
            <button class="action-btn" id="btn-mute-vc" onclick="toggleMute()" style="background: #ff4d4d; color: white; display: none;">Səsi Bağla</button>
            <button class="action-btn" id="btn-leave-vc" onclick="leaveVoiceChat()" style="background: #555; color: white; display: none;">Çıx</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const code = params.get('join');
        const me = localStorage.getItem("mafia_nickname");
        const safeMe = me ? me.replace(/[.#$/\[\]]/g, "_") : null;

        if(!code || !me) window.location.href = "index.html";

        let isHost = false;
        let playersData = {};
        let deadPlayers = {};
        let rolesData = {};
        let currentPhase = "";
        let votes = {};
        let mySelectedTarget = null;
        let amIDead = false;

        db.ref('rooms/' + code).once('value', snap => {
            const room = snap.val();
            if(!room) return;
            isHost = (room.host === me);
            
            if(isHost && room.gameState !== 'day_discuss') {
                db.ref('rooms/' + code + '/votes').remove();
                db.ref('rooms/' + code + '/eliminationResult').remove();
                db.ref('rooms/' + code).update({ gameState: 'day_discuss' });
            }
            listenToRoomUpdates();
        });

        function listenToRoomUpdates() {
            db.ref('rooms/' + code).on('value', snap => {
                const room = snap.val();
                if(!room) return;

                playersData = room.players || {};
                deadPlayers = room.deadPlayers || {};
                rolesData = room.assignedRoles || {};
                votes = room.votes || {};
                currentPhase = room.gameState;
                amIDead = !!deadPlayers[safeMe];

                updateUI();
                buildGrid();

                if (currentPhase === 'day_elimination') {
                    renderEliminationUI(room.eliminationResult);
                } else if (currentPhase === 'night_phase') {
                    window.location.href = "gece.html?join=" + code;
                }
            });
        }

        function updateUI() {
            if(isHost) {
                document.getElementById('hostStartVoteBtn').style.display = (currentPhase === 'day_discuss') ? 'block' : 'none';
                document.getElementById('hostEndVoteBtn').style.display = (currentPhase === 'day_voting') ? 'block' : 'none';
            }

            if(currentPhase === 'day_discuss') {
                document.getElementById('phaseText').innerText = "MÜZAKİRƏ MƏRHƏLƏSİ";
                document.getElementById('voteBtn').style.display = 'none';
                mySelectedTarget = null;
            } else if (currentPhase === 'day_voting') {
                document.getElementById('phaseText').innerText = "SƏSVERMƏ MƏRHƏLƏSİ";
                if(!amIDead) document.getElementById('voteBtn').style.display = 'block';
            }
        }

        function buildGrid() {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = "";
            const pKeys = Object.keys(playersData);

            let voteCounts = {};
            for(let voter in votes) {
                let target = votes[voter];
                voteCounts[target] = (voteCounts[target] || 0) + 1;
            }

            for(let i=0; i<30; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';

                if(i < pKeys.length) {
                    const sName = pKeys[i];
                    const pName = playersData[sName];

                    if(deadPlayers[sName]) {
                        card.classList.add('dead');
                        card.innerHTML = `<div class="p-name">${pName}</div><div class="p-status">[ ÖLÜ ]</div>`;
                    } else {
                        card.classList.add('alive');
                        let vCount = voteCounts[sName] || 0;
                        let voteHtml = currentPhase === 'day_voting' && vCount > 0 ? `<div class="p-votes">${vCount} SƏS</div>` : "";
                        
                        card.innerHTML = `<div class="p-name">${pName}</div>${voteHtml}`;

                        if(!amIDead && currentPhase === 'day_voting' && sName !== safeMe) {
                            card.onclick = () => selectTarget(sName);
                        }
                    }

                    if(mySelectedTarget === sName) card.classList.add('selected');
                } else {
                    card.style.visibility = "hidden";
                }
                grid.appendChild(card);
            }
        }

        function selectTarget(targetSafeName) {
            mySelectedTarget = targetSafeName;
            buildGrid();
        }

        function castVote() {
            if(!mySelectedTarget) { alert("Səs vermək üçün bir nəfər seçin!"); return; }
            db.ref('rooms/' + code + '/votes/' + safeMe).set(mySelectedTarget);
            document.getElementById('voteBtn').innerText = "Səs Dəyişdirilsin";
        }

        function showMyRole() {
            document.getElementById('myRoleValue').innerText = rolesData[safeMe] || "Dinc Sakin";
            document.getElementById('roleModal').style.display = "flex";
        }

        function exitGame() {
            if(confirm("Oyundan çıxmaq istədiyinizə əminsiniz? Çıxsanız ölü sayılacaqsınız.")) {
                db.ref('rooms/' + code + '/deadPlayers/' + safeMe).set(true).then(() => { window.location.href = "index.html"; });
            }
        }

        // HOST FUNKSİYALARI VƏ ASILMA
        function startVotingPhase() {
            db.ref('rooms/' + code).update({ gameState: 'day_voting', votes: null });
        }

        function endVotingPhase() {
            db.ref('rooms/' + code + '/votes').once('value', snap => {
                const currentVotes = snap.val() || {};
                let counts = {};
                let maxVotes = 0;
                let lynchedPlayer = null;
                let isTie = false;

                for(let v in currentVotes) {
                    let target = currentVotes[v];
                    counts[target] = (counts[target] || 0) + 1;
                    if(counts[target] > maxVotes) {
                        maxVotes = counts[target];
                        lynchedPlayer = target;
                        isTie = false;
                    } else if (counts[target] === maxVotes) {
                        isTie = true;
                    }
                }

                let finalResult = (isTie || !lynchedPlayer) ? "TIE" : lynchedPlayer;
                
                db.ref('rooms/' + code).update({ 
                    eliminationResult: finalResult,
                    gameState: 'day_elimination' 
                });

                setTimeout(() => {
                    let updates = { gameState: 'night_phase', votes: null };
                    if(finalResult !== "TIE") updates['deadPlayers/' + finalResult] = true;
                    db.ref('rooms/' + code).update(updates);
                }, 6000);
            });
        }

        function renderEliminationUI(result) {
            if(!result) return;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainAreaContainer').style.display = 'none';
            document.getElementById('voice-chat-panel').style.display = 'none';

            const mainTextEl = document.getElementById('resultMainText');
            const noteEl = document.getElementById('resultNote');

            if(result === "TIE") {
                mainTextEl.innerHTML = "HEÇ KİM ASILMADI!";
                mainTextEl.style.color = "#888";
                noteEl.innerText = "Səslər bərabər oldu.";
            } else {
                const hungName = playersData[result] || "Bilinməyən";
                const realRole = rolesData[result] || "Dinc Sakin";
                mainTextEl.innerHTML = `ASILAN: ${hungName}<br>ROLU: ${realRole}`;
                
                if(realRole === "Gizli Mafiya") {
                    mainTextEl.innerHTML = `ASILAN: ${hungName}<br>ROLU: Dinc Sakin`;
                    noteEl.innerText = "O, Gizli Mafiya idi. Öldüyü üçün əsl rolu şəhərdən gizlədildi.";
                } else if(realRole === "Canlı Bomba") {
                    noteEl.innerText = "Canlı Bomba asıldı! Ona səs verənlər də partlayacaq!";
                } else {
                    noteEl.innerText = "Şəhər qərarını verdi.";
                }
            }
            document.getElementById('resultOverlay').style.display = 'flex';
        }

        // ================= VOICE CHAT MƏNTİQİ =================
        const AGORA_APP_ID = "0b6c9c3436ad44baa6fdadc8d60971e3"; 
        const CHANNEL_NAME = "Bayram_MainRoom"; 
        const TOKEN = null; 
        let rtc = { client: null, localAudioTrack: null };
        let isMuted = false;

        function initAgoraClient() {
            rtc.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
            rtc.client.on("user-published", async (user, mediaType) => {
                await rtc.client.subscribe(user, mediaType);
                if (mediaType === "audio") user.audioTrack.play();
            });
        }
        window.addEventListener("DOMContentLoaded", initAgoraClient);

        async function joinVoiceChat() {
            try {
                document.getElementById("vc-status").innerText = "Qoşulur...";
                const myUID = me || "Player_" + Math.floor(Math.random() * 1000);
                await rtc.client.join(AGORA_APP_ID, CHANNEL_NAME, TOKEN, myUID);
                rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await rtc.client.publish([rtc.localAudioTrack]);
                
                document.getElementById("vc-status").innerText = "Status: Səsli çata qoşuldu";
                document.getElementById("vc-status").style.color = "#00ff00";
                document.getElementById("btn-join-vc").style.display = "none";
                document.getElementById("btn-mute-vc").style.display = "inline-block";
                document.getElementById("btn-leave-vc").style.display = "inline-block";
                isMuted = false;
            } catch (error) { console.error(error); }
        }

        async function toggleMute() {
            if (!rtc.localAudioTrack) return;
            if (!isMuted) {
                await rtc.localAudioTrack.setEnabled(false);
                isMuted = true;
                document.getElementById("btn-mute-vc").innerText = "Səsi Aç (Unmute)";
                document.getElementById("btn-mute-vc").style.backgroundColor = "#00ff00";
            } else {
                await rtc.localAudioTrack.setEnabled(true);
                isMuted = false;
                document.getElementById("btn-mute-vc").innerText = "Səsi Bağla (Mute)";
                document.getElementById("btn-mute-vc").style.backgroundColor = "#ff4d4d";
            }
        }

        async function leaveVoiceChat() {
            if (rtc.localAudioTrack) rtc.localAudioTrack.close();
            if (rtc.client) await rtc.client.leave();
            document.getElementById("vc-status").innerText = "Status: Səsli çata qoşulmayıb";
            document.getElementById("vc-status").style.color = "#c5c6c7";
            document.getElementById("btn-join-vc").style.display = "inline-block";
            document.getElementById("btn-mute-vc").style.display = "none";
            document.getElementById("btn-leave-vc").style.display = "none";
        }
        window.addEventListener("beforeunload", leaveVoiceChat);
    </script>
</body>
</html>
