<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OYUN MEYDANI | TDV-MAFIA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; width: 100%; background-color: #000; color: white; overflow: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg { width: 100%; height: 100%; background: url('babba.jpg') center/cover no-repeat; filter: brightness(0.2); }
        
        .game-layout { display: flex; width: 100%; height: 100%; position: relative; }
        .main-area { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; height: 100%; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; padding-bottom: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.8); p-padding: 10px; }
        .game-phase { font-size: 1.8rem; font-weight: bold; color: #ff0000; text-shadow: 0 0 10px #ff0000; text-transform: uppercase; }
        .game-timer { font-size: 1.8rem; color: #4ade80; border: 1px solid #4ade80; padding: 5px 15px; font-weight: bold; }
        
        .status-box { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff0000; padding: 15px; margin-bottom: 25px; text-align: center; font-size: 1.1rem; }
        
        .grid-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .player-card { background: rgba(20,20,20,0.9); border: 1px solid #555; padding: 20px 10px; text-align: center; position: relative; border-radius: 4px; transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 120px; }
        .player-card.alive { border-color: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.1); }
        .player-card.dead { border-color: #ff0000; opacity: 0.4; background: rgba(40,0,0,0.6); }
        .player-card.dead::after { content: "ÖLÜ"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); color: #ff0000; font-size: 2rem; font-weight: bold; border: 3px solid #ff0000; padding: 5px 10px; background: #000; letter-spacing: 2px; }
        
        .p-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; color: #fff; word-break: break-all; }
        .p-role-tag { font-size: 0.8rem; color: #ff0000; font-weight: bold; margin-top: 5px; text-transform: uppercase; background: rgba(255,0,0,0.1); padding: 2px 6px; border: 1px solid #ff0000; }
        .p-vote-count { position: absolute; bottom: 5px; right: 8px; font-size: 0.9rem; color: #4ade80; font-weight: bold; }
        
        .vote-btn { margin-top: 10px; padding: 6px 12px; background: none; border: 1px solid #ff0000; color: #ff0000; cursor: pointer; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; width: 85%; }
        .vote-btn:hover:not(:disabled) { background: #ff0000; color: #fff; }
        .vote-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        .controls-area { display: flex; gap: 15px; justify-content: center; margin-top: auto; padding: 20px 0; border-top: 1px solid #333; }
        .btn { padding: 12px 25px; font-size: 1rem; font-weight: bold; border: 2px solid #ff0000; background: none; color: #ff0000; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: #ff0000; color: white; }
        .btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        /* NƏTİCƏ PANELİ (BÜTÜN OYUNÇULARDA GÖRÜNƏCƏK POPUP) */
        .result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .result-title { font-size: 4rem; font-weight: 900; color: #ff0000; text-shadow: 0 0 30px #ff0000; margin-bottom: 25px; text-transform: uppercase; }
        .result-msg { font-size: 1.5rem; color: #fff; max-width: 700px; line-height: 1.6; margin-bottom: 40px; }
        
        /* ÇAT SİSTEMİ PANELİ */
        .chat-panel { width: 320px; background: rgba(10,10,10,0.95); border-left: 2px solid #ff0000; display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        .chat-header { padding: 15px; border-bottom: 1px solid #ff0000; font-weight: bold; color: #ff0000; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.95rem; }
        .msg { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 4px; line-height: 1.4; word-break: break-all; }
        .msg span { color: #ff4444; font-weight: bold; margin-right: 5px; }
        .chat-input-area { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #000; border: 1px solid #ff0000; padding: 10px; color: white; font-family: monospace; outline: none; }
        
        @media (max-width: 768px) {
            .game-layout { flex-direction: column; }
            .chat-panel { width: 100%; height: 250px; border-left: none; border-top: 2px solid #ff0000; }
            .result-title { font-size: 2.2rem; }
            .result-msg { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg"></div></div>
    
    <div id="gameResultOverlay" class="result-overlay">
        <h1 id="resTitle" class="result-title">OYUN BİTDİ</h1>
        <p id="resMessage" class="result-msg">Nəticələr hesablanır...</p>
        <button type="button" class="btn" onclick="location.href='index.html'">ƏSAS MENYUYA QAYIT</button>
    </div>

    <div class="game-layout">
        <div class="main-area">
            <div class="header-panel">
                <div id="phaseText" class="game-phase">GÜNDÜZ MÜZAKİRƏSİ</div>
                <div id="gameTimer" class="game-timer">00:00</div>
            </div>
            
            <div id="infoBar" class="status-box">
                Sistem yüklənir, xahiş edirik gözləyin...
            </div>
            
            <div id="playersGrid" class="grid-players"></div>
            
            <div class="controls-area">
                <button type="button" id="skipVoteBtn" class="btn">SƏSVERMƏNİ KEÇ (SKIP)</button>
                <button type="button" id="hostNextPhaseBtn" class="btn" style="display: none; border-color: #4ade80; color: #4ade80;">NÖVBƏTİ MƏRHƏLƏ (HOST)</button>
            </div>
        </div>
        
        <div class="chat-panel">
            <div class="chat-header">
                <span>CANLI ÇAT</span>
                <span id="aliveCounter" style="color: #4ade80; font-size: 0.85rem;">SAĞ: 0</span>
            </div>
            <div id="chatBox" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInp" class="chat-input" placeholder="Mesaj yazın..." maxlength="150">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tdv-mafia-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('join');
        const me = localStorage.getItem("mafia_nickname") || "Agent";
        const safeMe = me.replace(/[.#$/\[\]]/g, "_");
        
        let myRole = "";
        let myStatus = "alive";
        let isHost = false;
        let currentPhase = "day"; 
        let hasVoted = false; 
        let roomData = null;
        
        if (!code) {
            location.href = "index.html";
        }

        // MAFİYA KOMANDASINDA OLAN ROLLARIN SİYAHISI
        const mafiaRoles = ["Sadə Mafiya", "Don", "Vəkil", "Aypara", "Xəfiyyə Mafiya", "Hiyləgər Mafiya", "Gizli Mafiya"];

        window.onload = function() {
            initGameSystem();
        };

        function initGameSystem() {
            // Oyun otağını dinləməyə başlayırıq
            db.ref('rooms/' + code).on('value', snapshot => {
                roomData = snapshot.val();
                if (!roomData) {
                    location.href = "index.html";
                    return;
                }
                
                isHost = (roomData.host === me);
                if (isHost) {
                    document.getElementById("hostNextPhaseBtn").style.display = "inline-block";
                } else {
                    document.getElementById("hostNextPhaseBtn").style.display = "none";
                }
                
                // Mərhələ və statusları oxu
                currentPhase = roomData.currentPhase || "day";
                myRole = roomData.assignments ? roomData.assignments[safeMe] : "Dinc sakin";
                myStatus = roomData.playerStatuses ? roomData.playerStatuses[safeMe] : "alive";
                
                updateInterface();
                renderPlayers();
                checkGlobalGameResult();
            });

            // Səsvermə kilidini yoxlamaq üçün fərdi səs məlumatını dinləyirik
            db.ref('rooms/' + code + '/votes/' + safeMe).on('value', snap => {
                if(snap.exists()) {
                    hasVoted = true;
                    document.getElementById("skipVoteBtn").disabled = true;
                } else {
                    hasVoted = false;
                    document.getElementById("skipVoteBtn").disabled = (myStatus === "dead");
                }
            });

            // Çat sistemini işə salırıq
            listenChat();
            
            // "Skip" (Keç) düyməsinin kliklənməsi
            document.getElementById("skipVoteBtn").onclick = function() {
                if (hasVoted || myStatus === "dead") return;
                
                // Kilidləmə: Skip-ə basıldığı an həm bu düymə, həm də digər səs düymələri kod səviyyəsində qorunur
                db.ref('rooms/' + code + '/votes/' + safeMe).set("skip").then(() => {
                    document.getElementById("skipVoteBtn").disabled = true;
                    hasVoted = true;
                    renderPlayers(); // İnterfeysi yenilə və səs vermə düymələrini bağla
                });
            };

            // Host üçün növbəti mərhələyə keçid düyməsi
            document.getElementById("hostNextPhaseBtn").onclick = function() {
                processPhaseTransition();
            };
        }

        function updateInterface() {
            const phaseTxt = document.getElementById("phaseText");
            const infoBar = document.getElementById("infoBar");
            
            if (currentPhase === "day") {
                phaseTxt.innerText = "GÜNDÜZ MÜZAKİRƏSİ";
                phaseTxt.style.color = "#4ade80";
                phaseTxt.style.textShadow = "0 0 10px #4ade80";
                infoBar.innerText = `Sənin rolun: ${myRole}. Şübhəli bildiyiniz şəxsə səs verin və ya səsverməni keçin.`;
                infoBar.style.color = "#fff";
            } else if (currentPhase === "night") {
                phaseTxt.innerText = "GECƏ PROSESİ";
                phaseTxt.style.color = "#ff0000";
                phaseTxt.style.textShadow = "0 0 10px #ff0000";
                
                if (mafiaRoles.includes(myRole)) {
                    infoBar.innerText = `GECƏ. Sən Mafiyasan (${myRole}). Komandanızla hədəfi seçib səs verin!`;
                    infoBar.style.color = "#ff4444";
                } else {
                    infoBar.innerText = `GECƏ. Sən Şəhər sakinisən (${myRole}). Mafiya hərəkətdədir, gözləyin...`;
                    infoBar.style.color = "#aaa";
                }
            }
            
            if (myStatus === "dead") {
                infoBar.innerText = `SƏN ÖLDÜRÜLDÜN! Oyunu sadəcə izləyə bilərsən. Səsvermə hüququn yoxdur.`;
                infoBar.style.color = "#ff0000";
                document.getElementById("skipVoteBtn").disabled = true;
            }
        }

        function renderPlayers() {
            const grid = document.getElementById("playersGrid");
            grid.innerHTML = "";
            
            if (!roomData || !roomData.players) return;
            
            let aliveCount = 0;
            const votesData = roomData.votes || {};
            
            // Hər kəsin aldığı səsləri hesablayaq
            const voteCounts = {};
            Object.values(votesData).forEach(v => {
                if (v !== "skip") {
                    voteCounts[v] = (voteCounts[v] || 0) + 1;
                }
            });

            Object.keys(roomData.players).forEach(pKey => {
                const pName = roomData.players[pKey];
                const pStatus = roomData.playerStatuses ? roomData.playerStatuses[pKey] : "alive";
                const pRole = roomData.assignments ? roomData.assignments[pKey] : "Dinc sakin";
                
                if (pStatus === "alive") aliveCount++;
                
                const card = document.createElement("div");
                card.className = `player-card ${pStatus}`;
                
                // Oyunçu adı
                const nameDiv = document.createElement("div");
                nameDiv.className = "p-name";
                nameDiv.innerText = pName;
                card.appendChild(nameDiv);
                
                // Əgər mafiyadırsa və ya oyun bitibsə rolları göstər
                if (pStatus === "alive" && (pName === me || (mafiaRoles.includes(myRole) && mafiaRoles.includes(pRole)))) {
                    const roleTag = document.createElement("span");
                    roleTag.className = "p-role-tag";
                    roleTag.innerText = pRole;
                    card.appendChild(roleTag);
                }
                
                // Aktiv səs sayı ekranı
                const currentVotes = voteCounts[pKey] || 0;
                if (currentVotes > 0 && pStatus === "alive") {
                    const voteBadge = document.createElement("span");
                    voteBadge.className = "p-vote-count";
                    voteBadge.innerText = `Səs: ${currentVotes}`;
                    card.appendChild(voteBadge);
                }
                
                // SƏS VERMƏ DÜYMƏSİ (Problem 1 Həlli: Həm Skip, həm də fərdə səs vermək qadağandır)
                if (pStatus === "alive" && myStatus === "alive" && pName !== me) {
                    // Əgər cari oyunçu hələ heç bir yerə (nə skip-ə, nə də adama) səs verməyibsə düymə aktiv olur
                    if (currentPhase === "day" || (currentPhase === "night" && mafiaRoles.includes(myRole))) {
                        const vBtn = document.createElement("button");
                        vBtn.type = "button";
                        vBtn.className = "vote-btn";
                        vBtn.innerText = "SƏS VER";
                        
                        if (hasVoted) {
                            vBtn.disabled = true;
                        }
                        
                        vBtn.onclick = function() {
                            if (hasVoted) return;
                            
                            db.ref('rooms/' + code + '/votes/' + safeMe).set(pKey).then(() => {
                                hasVoted = true;
                                document.getElementById("skipVoteBtn").disabled = true;
                                renderPlayers();
                            });
                        };
                        card.appendChild(vBtn);
                    }
                }
                
                grid.appendChild(card);
            });
            
            document.getElementById("aliveCounter").innerText = `SAĞ: ${aliveCount}`;
        }

        // PROBLEM 3 HƏLLİ: MAFİYA VƏ YAXŞI İNSANLARIN SAYI BƏRABƏR OLARSA MAFİYA QALİB GƏLİR
        function checkGlobalGameResult() {
            if (!roomData || !roomData.playerStatuses || !roomData.assignments) return;
            
            let aliveMafia = 0;
            let aliveInnocents = 0;
            
            Object.keys(roomData.players).forEach(pKey => {
                const status = roomData.playerStatuses[pKey] || "alive";
                const role = roomData.assignments[pKey] || "Dinc sakin";
                
                if (status === "alive") {
                    if (mafiaRoles.includes(role)) {
                        aliveMafia++;
                    } else {
                        // Müstəqil rollar yoxdursa, geri qalan hər kəs şəhər silsiləsidir (yaxşı insanlar)
                        aliveInnocents++;
                    }
                }
            });
            
            // Qələbə Şərtləri:
            if (aliveMafia === 0) {
                // Heç bir mafiya qalmayıbsa -> Şəhər (Yaxşılar) qalib gəlir
                setFinalVictoryState("ŞƏHƏR SAKİNLƏRİ QALİB GƏLDİ!", "Bütün mafiya üzvləri tamamilə təmizləndi. Şəhər asayişi bərpa olundu!");
            } else if (aliveMafia >= aliveInnocents) {
                // Problem 3 tələbi: Mafiyaların sayı yaxşı insanların sayına BƏRABƏR və ya onlardan ÇOX olarsa -> Mafiya qalib gəlir
                setFinalVictoryState("MAFİYA QALİB GƏLDİ!", "Mafiya sayı dinc sakinlərin sayına bərabər və ya daha çoxdur. Şəhər nəzarəti tamamilə itirdi!");
            }
        }

        // PROBLEM 2 HƏLLİ: NƏTİCƏLƏR ARTIQ SƏSVERMƏ BİTDİKDƏ VERİLƏNLƏR BAZASINA YAZILIR VƏ HAMIDA GÖRÜNÜR
        function setFinalVictoryState(title, message) {
            // Əgər verilənlər bazasında artıq sonluq təyin edilibsə, onu oxuyub hamıya göstəririk
            db.ref('rooms/' + code + '/finalResult').once('value').then(snap => {
                if (!snap.exists() && isHost) {
                    db.ref('rooms/' + code + '/finalResult').set({
                        title: title,
                        message: message
                    });
                }
            });

            // Hər kəsin ekranında popup açılır
            db.ref('rooms/' + code + '/finalResult').on('value', snap => {
                const data = snap.val();
                if (data) {
                    document.getElementById("resTitle").innerText = data.title;
                    document.getElementById("resMessage").innerText = data.message;
                    document.getElementById("gameResultOverlay").style.display = "flex";
                }
            });
        }

        function processPhaseTransition() {
            if (!isHost || !roomData) return;
            
            const votesData = roomData.votes || {};
            const voteCounts = {};
            let skipCount = 0;
            
            // Səsləri toplayırıq
            Object.values(votesData).forEach(v => {
                if (v === "skip") {
                    skipCount++;
                } else {
                    voteCounts[v] = (voteCounts[v] || 0) + 1;
                }
            });
            
            let dynamicTarget = null;
            let maxVotes = 0;
            let isTie = false;
            
            Object.keys(voteCounts).forEach(pKey => {
                if (voteCounts[pKey] > maxVotes) {
                    maxVotes = voteCounts[pKey];
                    dynamicTarget = pKey;
                    isTie = false;
                } else if (voteCounts[pKey] === maxVotes) {
                    isTie = true;
                }
            });
            
            // Əgər skip səsləri hər hansı bir şəxsə verilən maksimum səsdən çoxdursa və ya bərabərdirsə, kimsə edam edilmir
            if (skipCount >= maxVotes) {
                dynamicTarget = null;
            } else if (isTie) {
                dynamicTarget = null; // Bərabərlik halında heç kim asılmır
            }
            
            const updates = {};
            
            if (currentPhase === "day") {
                // Gündüz mərhələsi bitirsə, ən çox səs alan asılır (əgər seçilibsə)
                if (dynamicTarget) {
                    updates[`playerStatuses/${dynamicTarget}`] = "dead";
                    // Çatda sistem bildirişi kimi paylaşmaq
                    sendSystemChatMessage(`${roomData.players[dynamicTarget]} səsvermə ilə edam edildi.`);
                } else {
                    sendSystemChatMessage("Gündüz səsverməsində yekun qərar çıxmadı, kimsə edam edilmədi.");
                }
                updates['currentPhase'] = "night";
            } else {
                // Gecə mərhələsi bitirsə, mafiyanın vurduğu adam ölür
                if (dynamicTarget) {
                    updates[`playerStatuses/${dynamicTarget}`] = "dead";
                    sendSystemChatMessage(`Gecə qanlı keçdi! ${roomData.players[dynamicTarget]} qətlə yetirildi.`);
                } else {
                    sendSystemChatMessage("Gecə sakit keçdi, kimsə həyatını itirmədi.");
                }
                updates['currentPhase'] = "day";
            }
            
            // Səsverməni sıfırla və növbəti fazaya keç
            updates['votes'] = null;
            db.ref('rooms/' + code).update(updates);
        }

        function sendSystemChatMessage(text) {
            db.ref('rooms/' + code + '/chat').push({
                sender: "SİSTEM",
                msg: text,
                time: Date.now()
            });
        }

        function listenChat() {
            const chatBox = document.getElementById("chatBox");
            db.ref('rooms/' + code + '/chat').off(); // Köhnə dinləyicini təmizlə
            
            db.ref('rooms/' + code + '/chat').on('child_added', snap => {
                const data = snap.val();
                if (!data) return;
                
                const msgDiv = document.createElement("div");
                msgDiv.className = "msg";
                
                if (data.sender === "SİSTEM") {
                    msgDiv.innerHTML = `<span style="color: #4ade80;">[${data.sender}]:</span> <style="color: #ffcc00;">${data.msg}`;
                } else {
                    msgDiv.innerHTML = `<span>${data.sender}:</span> ${data.msg}`;
                }
                
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
            
            document.getElementById("chatInp").onkeypress = function(e) {
                if (e.key === "Enter") {
                    const txt = this.value.trim();
                    if (!txt) return;
                    
                    // Ölü oyunçular gecə yazı yazmasın və ya qaydaları pozmasın deyə yoxlama (istəyə bağlı)
                    db.ref('rooms/' + code + '/chat').push({
                        sender: me,
                        msg: txt,
                        time: Date.now()
                    });
                    this.value = "";
                }
            };
        }
    </script>
</body>
</html>
